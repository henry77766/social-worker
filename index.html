// ── 國定假日查詢（使用下方 TAIWAN_HOLIDAYS 陣列，由行事曆元件定義）──
const holidayCache = {};
async function fetchHolidays(year){
  if(holidayCache[year])return holidayCache[year];
  // TAIWAN_HOLIDAYS 定義於行事曆元件附近，此處動態取得
  const src=typeof TAIWAN_HOLIDAYS!=="undefined"?TAIWAN_HOLIDAYS:[];
  const map={};
  src.forEach(h=>{
    if(h.date&&h.date.startsWith(String(year)))map[h.date]=h.title;
  });
  holidayCache[year]=map;
  return map;
}

// Hook: 取得某日期範圍的假日
function useHolidays(years){
  const [holidays,setHolidays]=useState({});
  useEffect(()=>{
    let cancelled=false;
    Promise.all(years.map(y=>fetchHolidays(y))).then(results=>{
      if(cancelled)return;
      const merged=Object.assign({},...results);
      setHolidays(merged);
    });
    return()=>{cancelled=true;};
  },[years.join(",")]);
  return holidays;
}

// 取得日期的假日名稱（若非假日則回傳 null）
function getHolidayName(dateStr,holidays){
  return holidays[dateStr]||null;
}

function calcAgeFromDate(birthDate){
  if(!birthDate)return"";
  const bd=new Date(birthDate+"T00:00:00");
  if(isNaN(bd))return"";
  const now=new Date();
  let years=now.getFullYear()-bd.getFullYear();
  let months=now.getMonth()-bd.getMonth();
  if(now.getDate()<bd.getDate())months--;
  if(months<0){years--;months+=12;}
  if(years<0)return"";
  return months>0?`${years}歲${months}個月`:`${years}歲`;
}

// 民國年月日 → 西元日期字串 YYYY-MM-DD
function rocToAD(rocYear,month,day){
  if(!rocYear)return"";
  const y=parseInt(rocYear)+1911;
  const m=String(parseInt(month)||1).padStart(2,"0");
  const d=String(parseInt(day)||1).padStart(2,"0");
  return`${y}-${m}-${d}`;
}

function fmtDate(d){if(!d)return"";const dt=new Date(d+"T00:00:00");return`${dt.getFullYear()-1911}/${dt.getMonth()+1}/${dt.getDate()}`;}

function loadScript(src){
  return new Promise((res,rej)=>{
    if(document.querySelector(`script[src="${src}"]`)){res();return;}
    const s=document.createElement("script");
    s.src=src;s.onload=res;s.onerror=rej;
    document.head.appendChild(s);
  });
}

// ── 舊資料搬移（一次性，僅限第一位原始使用者）────────────────────
async function migrateOldData(){
  if(!db)return false;
  const uid=getUid();
  if(!uid)return false;

  // 全域標記：若已有人完成搬移，其他人跳過
  const metaDoc=await db.collection("_meta").doc("migration").get();
  if(metaDoc.exists)return false;

  // 檢查新路徑是否已有資料
  const checkSnap=await db.collection("users").doc(uid).collection("cases").limit(1).get();
  if(!checkSnap.empty)return false;

  // 檢查舊路徑是否有資料
  const COLS=["cases","visits","resources","diary","events","caseRecords","levelHistory"];
  let hasOld=false;
  for(const col of COLS){
    const snap=await db.collection(col).limit(1).get();
    if(!snap.empty){hasOld=true;break;}
  }
  if(!hasOld)return false;

  // 開始搬移
  const batch=db.batch();
  let count=0;
  for(const col of COLS){
    const snap=await db.collection(col).get();
    snap.docs.forEach(doc=>{
      const newRef=db.collection("users").doc(uid).collection(col).doc(doc.id);
      batch.set(newRef,doc.data());
      count++;
    });
  }
  // 寫入全域標記，防止其他用戶重複搬移
  batch.set(db.collection("_meta").doc("migration"),{
    migratedBy:uid,date:new Date().toISOString(),count
  });
  if(count>0)await batch.commit();
  return count>0;
}

// 取得目前登入者的 uid
function getUid(){
  try{return firebase.auth().currentUser?.uid||null;}catch{return null;}
}
// 資料路徑：users/{uid}/{collection}，無 uid 時 fallback 到舊路徑
function userCol(collection){
  const uid=getUid();
  return uid?db.collection("users").doc(uid).collection(collection):db.collection(collection);
}
async function fbGet(collection){
  if(!db)return[];
  const snap=await userCol(collection).get();
  return snap.docs.map(d=>({id:d.id,...d.data()}));
}
async function fbSave(collection,item){
  if(!db)return;
  const {id,...data}=item;
  await userCol(collection).doc(id).set(data);
}
async function fbDelete(collection,id){
  if(!db)return;
  await userCol(collection).doc(id).delete();
}

function LoginScreen({onLogin}){
  const [email,setEmail]=useState("");
  const [password,setPassword]=useState("");
  const [remember,setRemember]=useState(true);
  const [error,setError]=useState("");
  const [loading,setLoading]=useState(false);

  const handleLogin=async()=>{
    if(!email.trim()||!password.trim()){setError("請輸入帳號與密碼");return;}
    setLoading(true);setError("");
    try{
      const persistence=remember
        ?firebase.auth.Auth.Persistence.LOCAL    // 關閉瀏覽器後仍保持登入
        :firebase.auth.Auth.Persistence.SESSION; // 關閉分頁後自動登出
      await firebase.auth().setPersistence(persistence);
      await firebase.auth().signInWithEmailAndPassword(email.trim(),password);
      onLogin();
    }catch(e){
      const msgs={"auth/user-not-found":"找不到此帳號","auth/wrong-password":"密碼錯誤","auth/invalid-email":"電子信箱格式不正確","auth/too-many-requests":"嘗試次數過多，請稍後再試","auth/invalid-credential":"帳號或密碼錯誤"};
      setError(msgs[e.code]||"登入失敗，請確認帳號密碼");
    }finally{setLoading(false);}
  };

  const handleKey=e=>{if(e.key==="Enter")handleLogin();};

  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,fontFamily:font}}>
      <div style={{background:C.card,borderRadius:20,border:`1px solid ${C.border}`,padding:"48px 40px",width:"min(400px,92vw)",boxShadow:"0 8px 40px rgba(0,0,0,0.10)"}}>

          <div style={{fontSize:24,fontWeight:700,fontFamily:serif,color:C.text,marginBottom:6}}>社工工作站</div>
          <div style={{fontSize:13,color:C.muted}}>中正萬華・身心障礙者服務中心</div>
        </div>
        <div style={{marginBottom:16}}>
          <Label>電子信箱</Label>
          <input type="email" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={handleKey} placeholder="example@gmail.com" style={inp()} autoComplete="username"/>
        </div>
        <div style={{marginBottom:16}}>
          <Label>密碼</Label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={handleKey} placeholder="輸入密碼" style={inp()} autoComplete="current-password"/>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:24,cursor:"pointer"}} onClick={()=>setRemember(v=>!v)}>
          <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${remember?C.primary:C.border}`,background:remember?C.primary:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.15s"}}>
            {remember&&<span style={{color:"#fff",fontSize:12,lineHeight:1}}>✓</span>}
          </div>
          <span style={{fontSize:13,color:C.muted,userSelect:"none"}}>記住我（關閉瀏覽器後維持登入）</span>
        </div>
        {error&&<div style={{background:"#FFF0F0",border:`1px solid #ECC8C8`,borderRadius:8,padding:"10px 14px",fontSize:13,color:C.danger,marginBottom:16}}>{error}</div>}
        <Btn onClick={handleLogin} style={{width:"100%",padding:"12px",fontSize:15,opacity:loading?0.7:1}} disabled={loading}>
          {loading?"登入中...":"登入"}
        </Btn>
        <div style={{fontSize:11,color:C.muted,textAlign:"center",marginTop:20,lineHeight:1.7}}>

}

function parseExcelDate(val){
  if(!val&&val!==0)return"";
  if(typeof val==="string"){const s=val.trim();const roc=s.match(/^(\d{2,3})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);if(roc){const y=parseInt(roc[1])+1911,m=roc[2].padStart(2,"0"),d=roc[3].padStart(2,"0");return`${y}-${m}-${d}`;}const ad=s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);if(ad)return`${ad[1]}-${ad[2].padStart(2,"0")}-${ad[3].padStart(2,"0")}`;return s;}
  if(typeof val==="number"){const d=new Date(Math.round((val-25569)*86400*1000));return`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`;}
  return String(val);
}

// 解析新制障別：回傳 {type, detail}
function parseDisabilityType(val){
  if(!val)return{type:"",detail:""};
  const s=String(val).trim();
  const found=[];
  for(let i=1;i<=8;i++){if(s.includes(String(i)))found.push(i);}
  if(found.length===0)return{type:s,detail:""};
  if(found.length>=2)return{type:"多重障",detail:found.map(n=>"第"+n+"類").join("＋")};
  return{type:"第"+found[0]+"類",detail:""};
}

function ExcelImporter({onImport,onClose}){
  const [step,setStep]=useState("upload");
  const [headers,setHeaders]=useState([]);
  const [rows,setRows]=useState([]);
  const [mapping,setMapping]=useState({});
  const [loading,setLoading]=useState(false);
  const [fileName,setFileName]=useState("");

  const loadXLSX=()=>new Promise((res,rej)=>{if(window.XLSX){res(window.XLSX);return;}const s=document.createElement("script");s.src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";s.onload=()=>res(window.XLSX);s.onerror=()=>rej(new Error("載入失敗"));document.head.appendChild(s);});

  const handleFile=async(e)=>{
    const file=e.target.files[0];if(!file)return;
    setLoading(true);setFileName(file.name);
    try{
      const XLSX=await loadXLSX();
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf,{type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      if(json.length<2){alert("Excel 內容不足");setLoading(false);return;}
      const hdrs=json[0].map(h=>String(h).trim());
      const data=json.slice(1).filter(r=>r.some(v=>v!==""));
      setHeaders(hdrs);setRows(data);
      const auto={};
      FIELD_DEFS.forEach(({key})=>{const kws=AUTO_MATCH[key]||[];const idx=hdrs.findIndex(h=>kws.some(k=>h.includes(k)));if(idx>=0)auto[key]=String(idx);});
      setMapping(auto);setStep("map");
    }catch(err){alert("讀取失敗："+err.message);}
    setLoading(false);
  };

  const preview=rows.slice(0,3).map(r=>Object.fromEntries(FIELD_DEFS.map(({key})=>[key,mapping[key]!=null&&mapping[key]!==""?String(r[parseInt(mapping[key])]??""):""])));

  const DATE_KEYS=new Set(["caseInDate","assignDate","evalDueDate","openDate"]);
  const doImport=()=>{
    if(!mapping["name"]){alert("請先對應「姓名」欄位");return;}
    const imported=rows.map(r=>{
      const c={id:uid(),name:"",caseNo:"",idNo:"",status:"開案中",source:"",referralUnit:"",gender:"",birthDate:"",age:"",disabilityType:"",disabilityLevel:"",disabilityDetail:"",registeredAddr:"",addr:"",livingStatus:"",livingAlone:"",elderlyCouple:"",mainWorker:"莊子昂",caseInDate:"",assignDate:"",evalDueDate:"",openDate:toDay(),systemLevel:"",initialLevel:"",visitFreq:"",changeLevel:"",phone:"",phone2:"",emergencyContact:"",emergencyPhone:"",emergencyRelation:"",note:""};
      FIELD_DEFS.forEach(({key})=>{if(mapping[key]!=null&&mapping[key]!==""){const val=r[parseInt(mapping[key])];if(DATE_KEYS.has(key)){c[key]=parseExcelDate(val);}
          else if(key==="disabilityType"){const r=parseDisabilityType(val);c.disabilityType=r.type;c.disabilityDetail=r.detail;}
          else{c[key]=val!=null?String(val).trim():"";}}});
      return c;
    }).map(c=>{if(c.birthDate)c.age=calcAgeFromDate(c.birthDate);return c;}).filter(c=>c.name?.trim());
    if(imported.length===0){alert("找不到有效個案");return;}
    onImport(imported);
  };

  const Overlay=({children})=>(
    <div style={{position:"fixed",inset:0,background:"rgba(26,51,50,0.55)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:C.card,borderRadius:16,width:"min(700px,95vw)",maxHeight:"88vh",overflow:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.3)"}}>{children}</div>
    </div>
  );
  const MHead=({title,sub})=>(
    <div style={{padding:"24px 28px 18px",borderBottom:`1px solid ${C.border}`,marginBottom:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div><div style={{fontSize:16,fontWeight:700,color:C.text,fontFamily:serif}}>{title}</div>{sub&&<div style={{fontSize:12,color:C.muted,marginTop:4}}>{sub}</div>}</div>
        <button onClick={onClose} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.muted}}>✕</button>
      </div>
    </div>
  );

  if(step==="upload")return(<Overlay><MHead title="從 Excel 匯入個案" sub="支援 .xlsx 格式，第一列需為欄位標題"/><div style={{padding:"0 28px 32px"}}><label style={{display:"block",border:`2px dashed ${C.border}`,borderRadius:12,padding:"52px 24px",textAlign:"center",cursor:"pointer",background:C.cardAlt}}><div style={{fontSize:40,marginBottom:14}}>📂</div><div style={{fontSize:15,fontWeight:600,color:C.text,marginBottom:6}}>點擊選擇 Excel 檔案</div><div style={{fontSize:12,color:C.muted}}>支援 .xlsx</div><input type="file" accept=".xlsx,.xls" onChange={handleFile} style={{display:"none"}}/></label>{loading&&<div style={{textAlign:"center",color:C.muted,marginTop:16,fontSize:13}}>⏳ 讀取中...</div>}</div></Overlay>);

  if(step==="map")return(<Overlay><MHead title="對應 Excel 欄位" sub={`「${fileName}」共 ${rows.length} 筆，請確認欄位對應`}/><div style={{padding:"0 28px 28px"}}><div style={{background:"#E8F5E9",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#2E7D32",marginBottom:18}}>✅ 已自動辨識 {Object.values(mapping).filter(v=>v!=="").length} 個欄位</div><div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px 20px",marginBottom:20}}>{FIELD_DEFS.map(({key,label,required})=>(<div key={key}><Label>{label}{required?" *":""}</Label><select value={mapping[key]??""} onChange={e=>setMapping(m=>({...m,[key]:e.target.value}))} style={inp()}><option value="">（不匯入）</option>{headers.map((h,i)=><option key={i} value={String(i)}>{h}</option>)}</select></div>))}</div><div style={{display:"flex",gap:10,flexWrap:"wrap"}}><Btn onClick={()=>setStep("preview")}>預覽資料 →</Btn><Btn variant="secondary" onClick={()=>setStep("upload")}>重新選檔</Btn><Btn variant="secondary" onClick={onClose}>取消</Btn></div></div></Overlay>);

  if(step==="preview"){
    const mapped=FIELD_DEFS.filter(f=>mapping[f.key]);
    return(<Overlay><MHead title="確認匯入" sub={`共 ${rows.length} 筆，預覽前 3 筆`}/><div style={{padding:"0 28px 28px"}}><div style={{overflowX:"auto",marginBottom:20,borderRadius:10,border:`1px solid ${C.border}`}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}><thead><tr style={{background:C.cardAlt}}>{mapped.map(f=><th key={f.key} style={{padding:"10px 12px",textAlign:"left",borderBottom:`1px solid ${C.border}`,color:C.muted,fontWeight:600,whiteSpace:"nowrap"}}>{f.label}</th>)}</tr></thead><tbody>{preview.map((row,i)=>(<tr key={i} style={{borderBottom:`1px solid ${C.border}`}}>{mapped.map(f=><td key={f.key} style={{padding:"10px 12px",color:C.text,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row[f.key]||<span style={{color:C.border}}>—</span>}</td>)}</tr>))}</tbody></table></div><div style={{display:"flex",gap:10,flexWrap:"wrap"}}><Btn variant="accent" onClick={doImport}>✓ 匯入 {rows.length} 筆個案</Btn><Btn variant="secondary" onClick={()=>setStep("map")}>← 返回修改</Btn><Btn variant="secondary" onClick={onClose}>取消</Btn></div></div></Overlay>);
  }
  return null;
}

// ── SHARED FORM ROW (defined outside components to prevent focus loss) ──
function FormRow({label, field, type="text", opts, span=1, value, onChange}){
  return(
    <div style={{gridColumn:`span ${span}`}}>
      <label style={{fontSize:12,color:"#7A7268",display:"block",marginBottom:4,fontWeight:500}}>{label}</label>
      {opts
        ? <select value={value||""} onChange={e=>onChange(field,e.target.value)}
            style={{width:"100%",padding:"8px 12px",border:"1px solid #E0D8CF",borderRadius:8,fontSize:14,fontFamily:"'Noto Sans TC',sans-serif",color:"#252220",background:"#FAFAF7",outline:"none",boxSizing:"border-box"}}>
            {opts.map(o=><option key={o} value={o}>{o}</option>)}
          </select>
        : <input type={type} value={value||""} onChange={e=>onChange(field,e.target.value)}
            style={{width:"100%",padding:"8px 12px",border:"1px solid #E0D8CF",borderRadius:8,fontSize:14,fontFamily:"'Noto Sans TC',sans-serif",color:"#252220",background:"#FAFAF7",outline:"none",boxSizing:"border-box"}}/>
      }
    </div>
  );
}

                          <span style={{fontSize:11,color:C.muted}}>→</span>
                          <span style={{fontSize:12,padding:"1px 8px",borderRadius:20,background:h.auto?"#E8F5EE":"#FFF4E0",color:h.auto?"#2A7A4A":C.accent,fontWeight:700}}>{h.to}</span>
                          <span style={{fontSize:10,color:C.muted,marginLeft:"auto"}}>{h.auto?"自動偵測":"手動補登"}</span>
                        </div>
                        {h.note&&<div style={{fontSize:12,color:C.muted,marginTop:2}}>{h.note}</div>}
                      </div>
                    </div>
                  ))
                }
              </Section>
            );
          })()}
          {records.length>0&&(
            <Section title={`最近聯繫紀錄（共 ${records.length} 筆）`}>
              {records.slice(0,5).map(r=>(
                <div key={r.id} style={{padding:"10px 14px",borderRadius:8,background:C.cardAlt,border:`1px solid ${C.border}`,marginBottom:8}}>
                  <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:r.content?6:0,flexWrap:"wrap"}}>
                    <span style={{fontSize:12,color:C.primary,fontWeight:600}}>{fmtDate(r.date)}</span>
                    <span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#E8F0FB",color:"#3A5FAA",fontWeight:500}}>{r.contactMethod}</span>
                    {r.contactPerson&&<span style={{fontSize:12,color:C.muted}}>{r.contactPerson}</span>}
                    {r.resourceUnit&&<span style={{fontSize:12,color:C.muted}}>・{r.resourceUnit}</span>}
                    <span style={{fontSize:12,color:C.muted,marginLeft:"auto"}}>×{r.contactCount||1}次</span>
                  </div>
                  {r.content&&<div style={{fontSize:12,color:C.text,lineHeight:1.7,whiteSpace:"pre-wrap"}}>{r.content}</div>}
                </div>
              ))}
              {records.length>5&&<div style={{fontSize:12,color:C.muted,textAlign:"center",marginTop:4}}>…另有 {records.length-5} 筆，請開啟聯繫紀錄查看</div>}
            </Section>
          )}
        </div>

        <div style={{padding:"16px 28px",borderTop:`1px solid ${C.border}`,display:"flex",gap:10,justifyContent:"flex-end"}}>
          <Btn variant="secondary" onClick={onClose}>關閉</Btn>
          <Btn onClick={onEdit}>✏️ 編輯個案</Btn>
        </div>
      </div>
    </div>
  );
}

// ── CASES ───────────────────────────────────────────────────────
const CASE_STATUS=["開案中","待評估","結案"];
const DISABILITY_LEVELS=["輕度","中度","重度","極重度"];
const DISABILITY_TYPES=["","第1類","第2類","第3類","第4類","第5類","第6類","第7類","第8類","多重障"];

function CaseList({data,setData,onSave,onDelete}){
  const blank={name:"",caseNo:"",idNo:"",status:"開案中",source:"",referralUnit:"",gender:"",birthDate:"",age:"",disabilityType:"",disabilityLevel:"",disabilityDetail:"",registeredAddr:"",addr:"",livingStatus:"",livingAlone:"",elderlyCouple:"",mainWorker:"莊子昂",caseInDate:"",assignDate:"",evalDueDate:"",openDate:toDay(),systemLevel:"",initialLevel:"",visitFreq:"",changeLevel:"",phone:"",phone2:"",emergencyContact:"",emergencyPhone:"",emergencyRelation:"",note:""};
  const [showForm,setShowForm]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [form,setForm]=useState(blank);
  const [search,setSearch]=useState("");
  const [expanded,setExpanded]=useState(null);
  const [importMsg,setImportMsg]=useState(null);
  const [editCase,setEditCase]=useState(null);
  const [viewCase,setViewCase]=useState(null);
  const [statusFilter,setStatusFilter]=useState("all");
  const [groupBy,setGroupBy]=useState("none");
  const [selectedIds,setSelectedIds]=useState(new Set());
  const [selectMode,setSelectMode]=useState(false);
  const [contactPreview,setContactPreview]=useState(null);
  const [recordsCase,setRecordsCase]=useState(null);

  const fld=(k,v)=>setForm(f=>{
    const next={...f,[k]:v};
    if(k==="birthDate")next.age=calcAgeFromDate(v);
    return next;
  });
  const save=async()=>{
    if(!form.name.trim()){alert("請填寫姓名");return;}
    const newCase={...form,id:uid()};
    setData(d=>({...d,cases:[...d.cases,newCase]}));
    await onSave("cases",newCase);
    setForm(blank);setShowForm(false);
  };
  const del=async id=>{
    if(!confirm("確定刪除此個案？"))return;
    setData(d=>({...d,cases:d.cases.filter(c=>c.id!==id)}));
    await onDelete("cases",id);
    setExpanded(null);
  };
  const saveEdit=async(updated)=>{
    // 自動偵測等級變動
    const prev=data.cases.find(c=>c.id===updated.id);
    const levelFields=["systemLevel","initialLevel","changeLevel"];
    const changes=[];
    levelFields.forEach(f=>{
      if(prev&&prev[f]&&updated[f]&&prev[f]!==updated[f]){
        changes.push({field:f,from:prev[f],to:updated[f]});
      }
    });
    if(changes.length>0){
      for(const ch of changes){
        const record={
          id:uid(),caseId:updated.id,caseName:updated.name,
          date:toDay(),field:ch.field,from:ch.from,to:ch.to,
          note:"",auto:true
        };
        setData(d=>({...d,levelHistory:[...(d.levelHistory||[]),record]}));
        await onSave("levelHistory",record);
      }
    }
    setData(d=>({...d,cases:d.cases.map(c=>c.id===updated.id?updated:c)}));
    await onSave("cases",updated);
  };
  const bulkDelete=async()=>{
    if(selectedIds.size===0)return;
    if(!confirm(`確定刪除選取的 ${selectedIds.size} 個個案？此操作無法復原。`))return;
    setData(d=>({...d,cases:d.cases.filter(c=>!selectedIds.has(c.id))}));
    for(const id of selectedIds)await onDelete("cases",id);
    setSelectedIds(new Set());
    setSelectMode(false);
  };
  const toggleSelect=(id)=>{
    setSelectedIds(prev=>{
      const next=new Set(prev);
      next.has(id)?next.delete(id):next.add(id);
      return next;
    });
  };
  const toggleAll=()=>{
    if(selectedIds.size===filtered.length){setSelectedIds(new Set());}
    else{setSelectedIds(new Set(filtered.map(c=>c.id)));}
  };
  const handleImport=async(imported)=>{
    setData(d=>({...d,cases:[...d.cases,...imported]}));
    for(const c of imported)await onSave("cases",c);
    setShowImport(false);
    setImportMsg(`✅ 成功匯入 ${imported.length} 筆個案！`);
    setTimeout(()=>setImportMsg(null),5000);
  };

  const filtered=data.cases.filter(c=>(statusFilter==="all"||c.status===statusFilter)&&(c.name?.includes(search)||c.caseNo?.includes(search)||c.addr?.includes(search)||c.idNo?.includes(search)||c.disabilityType?.includes(search)));
  const stColor={"開案中":C.primary,"結案":C.muted,"待評估":"#4A6E8A"};
  // FRow moved outside as FormRow to prevent focus loss

  return(
    <div>
      {showImport&&<ExcelImporter onImport={handleImport} onClose={()=>setShowImport(false)}/>}
      {editCase&&<CaseEditModal caseData={editCase} onSave={saveEdit} onClose={()=>setEditCase(null)}/>}
      {viewCase&&<CaseViewModal c={viewCase} caseRecords={data.caseRecords} levelHistory={data.levelHistory} setData={setData} onSave={onSave} onEdit={()=>{setEditCase(viewCase);setViewCase(null);}} onClose={()=>setViewCase(null)}/>}
      {recordsCase&&<CaseRecordsModal caseData={recordsCase} caseRecords={data.caseRecords||[]} setData={setData} onSave={onSave} onDelete={onDelete} onClose={()=>setRecordsCase(null)}/>}
      {/* 聯繫資訊預覽 Modal */}
      {contactPreview&&(
        <div style={{position:"fixed",inset:0,background:"rgba(26,51,50,0.45)",zIndex:1500,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
          onClick={e=>{if(e.target===e.currentTarget)setContactPreview(null);}}>
          <div style={{background:C.card,borderRadius:16,width:"min(400px,94vw)",boxShadow:"0 16px 48px rgba(0,0,0,0.22)",overflow:"hidden"}}>
            {/* header */}
            <div style={{background:C.sidebar,padding:"18px 22px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:16,fontWeight:700,color:"#fff",fontFamily:serif}}>{contactPreview.name}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,0.45)",marginTop:2}}>{contactPreview.caseNo||"—"}&nbsp;·&nbsp;{contactPreview.status||""}</div>
              </div>
              <button onClick={()=>setContactPreview(null)} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
            </div>
            {/* body */}
            <div style={{padding:"20px 22px"}}>
              {/* 本人電話 */}
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:"0.06em",marginBottom:8}}>本人聯絡</div>
                {contactPreview.phone?(
                  <a href={`tel:${contactPreview.phone}`} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#F0F7F4",borderRadius:10,textDecoration:"none",color:C.text,marginBottom:6}}>
                    <span style={{fontSize:18}}>📞</span>
                    <div>
                      <div style={{fontWeight:600,fontSize:14,color:C.primary}}>{contactPreview.phone}</div>
                      <div style={{fontSize:11,color:C.muted}}>本人電話</div>
                    </div>
                  </a>
                ):<div style={{fontSize:13,color:C.muted,padding:"8px 0"}}>（未填）</div>}
                {contactPreview.phone2&&(
                  <a href={`tel:${contactPreview.phone2}`} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:C.cardAlt,borderRadius:10,textDecoration:"none",color:C.text,border:`1px solid ${C.border}`}}>
                    <span style={{fontSize:18}}>📱</span>
                    <div>
                      <div style={{fontWeight:600,fontSize:14}}>{contactPreview.phone2}</div>
                      <div style={{fontSize:11,color:C.muted}}>備用電話</div>
                    </div>
                  </a>
                )}
              </div>
              {/* 緊急聯絡人 */}
              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:"0.06em",marginBottom:8}}>緊急聯絡人</div>
                {(contactPreview.emergencyContact||contactPreview.emergencyPhone)?(
                  <div style={{background:"#FFF8ED",border:"1px solid #F0D8A8",borderRadius:10,padding:"12px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <span style={{fontWeight:600,fontSize:14,color:C.text}}>{contactPreview.emergencyContact||"（姓名未填）"}</span>
                      {contactPreview.emergencyRelation&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#F0D8A8",color:"#7A5A20"}}>{contactPreview.emergencyRelation}</span>}
                    </div>
                    {contactPreview.emergencyPhone&&(
                      <a href={`tel:${contactPreview.emergencyPhone}`} style={{display:"flex",alignItems:"center",gap:8,textDecoration:"none",color:C.primary,fontWeight:600,fontSize:14}}>
                        <span>📞</span>{contactPreview.emergencyPhone}
                      </a>
                    )}
                  </div>
                ):<div style={{fontSize:13,color:C.muted,padding:"8px 0"}}>（未填）</div>}
              </div>
              {/* 地址 */}
              {(contactPreview.registeredAddr||contactPreview.addr)&&(
                <div style={{borderTop:`1px solid ${C.border}`,paddingTop:14,marginTop:2}}>
                  <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:"0.06em",marginBottom:8}}>地址資訊</div>
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {contactPreview.registeredAddr&&<div style={{fontSize:13,color:C.text,lineHeight:1.6}}>🏠 <span style={{color:C.muted,fontSize:11}}>戶籍</span>　{contactPreview.registeredAddr}</div>}
                    {contactPreview.addr&&<div style={{fontSize:13,color:C.text,lineHeight:1.6}}>📍 <span style={{color:C.muted,fontSize:11}}>居住</span>　{contactPreview.addr}</div>}
                  </div>
                </div>
              )}
            </div>
            <div style={{padding:"12px 22px 18px",display:"flex",gap:8,justifyContent:"flex-end"}}>
              <Btn variant="secondary" onClick={()=>setContactPreview(null)}>關閉</Btn>
              <Btn onClick={()=>{setEditCase(contactPreview);setContactPreview(null);}}>✏️ 編輯個案</Btn>
            </div>
          </div>
        </div>
      )}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:selectMode?12:24,flexWrap:"wrap",gap:10}}>
        <H1>個案管理</H1>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <Btn variant="secondary" onClick={()=>{setShowImport(true);setShowForm(false);}}>📂 匯入 Excel</Btn>
          <Btn variant={selectMode?"accent":"secondary"} onClick={()=>{setSelectMode(v=>!v);setSelectedIds(new Set());}}>
            {selectMode?"取消選取":"☑ 批次刪除"}
          </Btn>
          {!selectMode&&<Btn variant={showForm?"secondary":"primary"} onClick={()=>setShowForm(v=>!v)}>{showForm?"取消":"+ 新增個案"}</Btn>}
        </div>
      </div>

      {/* 批次操作工具列 */}
      {selectMode&&(
        <div style={{display:"flex",alignItems:"center",gap:12,background:"#FFF4E8",border:`1px solid #F0D0A0`,borderRadius:10,padding:"10px 16px",marginBottom:20,flexWrap:"wrap"}}>
          <button onClick={toggleAll} style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",fontSize:13,color:C.text,fontFamily:font,fontWeight:500}}>
            <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${selectedIds.size===filtered.length&&filtered.length>0?C.accent:C.border}`,background:selectedIds.size===filtered.length&&filtered.length>0?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              {selectedIds.size===filtered.length&&filtered.length>0&&<span style={{color:"#fff",fontSize:11}}>✓</span>}
            </div>
            全選（{filtered.length} 個案）
          </button>
          <span style={{color:C.muted,fontSize:13}}>已選取 <strong style={{color:C.accent}}>{selectedIds.size}</strong> 個</span>
          <Btn variant="danger" onClick={bulkDelete} style={{marginLeft:"auto",opacity:selectedIds.size===0?0.4:1}} disabled={selectedIds.size===0}>
            🗑 刪除選取的 {selectedIds.size} 個
          </Btn>
        </div>
      )}
      {importMsg&&<div style={{background:"#E8F5E9",border:`1px solid #A5D6A7`,borderRadius:10,padding:"12px 18px",marginBottom:16,fontSize:13,color:"#2E7D32"}}>{importMsg}</div>}
      {showForm&&(<Card style={{marginBottom:20}}>
  <div style={{fontSize:14,fontWeight:600,marginBottom:16}}>新增個案</div>
  <div style={{fontSize:12,color:C.muted,marginBottom:12,fontWeight:500}}>基本資料</div>
  <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px 16px",marginBottom:16}}>
    <FormRow label="姓名 *" field="name" value={form["name"]} onChange={fld}/>
    <FormRow label="案號" field="caseNo" value={form["caseNo"]} onChange={fld}/>
    <FormRow label="身分證字號" field="idNo" value={form["idNo"]} onChange={fld}/>
    <FormRow label="案況" field="status" value={form["status"]} onChange={fld} opts={CASE_STATUS}/>
    <FormRow label="生理性別" field="gender" value={form["gender"]} onChange={fld} opts={["","男","女","其他"]}/>
    <div>
      <Label>出生日期</Label>
      <div style={{display:"flex",gap:5,marginBottom:5}}>
        {["ad","roc"].map(t=>(
          <button key={t} type="button" onClick={()=>fld("dateInputType",t)}
            style={{flex:1,padding:"3px 0",borderRadius:6,border:`1px solid ${(form["dateInputType"]||"ad")===t?C.primary:C.border}`,background:(form["dateInputType"]||"ad")===t?"#EEF7F3":C.cardAlt,color:(form["dateInputType"]||"ad")===t?C.primary:C.muted,cursor:"pointer",fontSize:11,fontFamily:font,fontWeight:600}}>
            {t==="ad"?"西元":"民國"}
          </button>
        ))}
      </div>
      {(form["dateInputType"]||"ad")==="ad"
        ? <input type="date" value={form["birthDate"]||""} onChange={e=>fld("birthDate",e.target.value)} style={inp()}/>
        : <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <input value={form["_rocY"]||""} onChange={e=>{const v=e.target.value;fld("_rocY",v);if(v)fld("birthDate",rocToAD(v,form["_rocM"],form["_rocD"]));}} placeholder="民國年" style={{...inp(),width:70,fontSize:13}}/>
            <span style={{color:C.muted,fontSize:12}}>年</span>
            <input value={form["_rocM"]||""} onChange={e=>{const v=e.target.value;fld("_rocM",v);if(form["_rocY"])fld("birthDate",rocToAD(form["_rocY"],v,form["_rocD"]));}} placeholder="月" style={{...inp(),width:50,fontSize:13}}/>
            <span style={{color:C.muted,fontSize:12}}>月</span>
            <input value={form["_rocD"]||""} onChange={e=>{const v=e.target.value;fld("_rocD",v);if(form["_rocY"])fld("birthDate",rocToAD(form["_rocY"],form["_rocM"],v));}} placeholder="日" style={{...inp(),width:50,fontSize:13}}/>
            <span style={{color:C.muted,fontSize:12}}>日</span>
          </div>
      }
      {form["birthDate"]&&<div style={{fontSize:11,color:C.primary,marginTop:4}}>西元：{form["birthDate"]}</div>}
    </div>
    <div>
      <Label>年齡</Label>
      <input value={form["age"]||""} readOnly={!!form["birthDate"]}
        onChange={e=>fld("age",e.target.value)}
        placeholder={form["birthDate"]?"依出生日期自動計算":"手動輸入"}
        style={{...inp(),background:form["birthDate"]?"#F0F7F4":"",color:form["birthDate"]?C.primary:C.text}}/>
    </div>
    <div>
              <Label>新制障別</Label>
              <select value={form.disabilityType||""} onChange={e=>{fld("disabilityType",e.target.value);if(e.target.value!=="多重障")fld("disabilityDetail","");}} style={inp()}>
                {DISABILITY_TYPES.map(o=><option key={o} value={o}>{o}</option>)}
              </select>
              {form.disabilityType==="多重障"&&(
                <div style={{marginTop:8}}>
                  <div style={{fontSize:11,color:C.muted,marginBottom:6}}>選擇合併的障別類別：</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {[1,2,3,4,5,6,7,8].map(n=>{
                      const label="第"+n+"類";
                      const selected=(form.disabilityDetail||"").includes(label);
                      return(
                        <button key={n} type="button" onClick={()=>{
                          const cur=(form.disabilityDetail||"").split("＋").filter(Boolean);
                          const next=selected?cur.filter(x=>x!==label):[...cur,label].sort();
                          fld("disabilityDetail",next.join("＋"));
                        }} style={{padding:"4px 12px",borderRadius:20,border:`1px solid ${selected?C.primary:C.border}`,background:selected?C.primary:C.cardAlt,color:selected?"#fff":C.text,cursor:"pointer",fontSize:12,fontFamily:font}}>
                          {label}
                        </button>
                      );
                    })}
                  </div>
                  {form.disabilityDetail&&<div style={{fontSize:12,color:C.primary,marginTop:6}}>{form.disabilityDetail}</div>}
                </div>
              )}
            </div>
    <FormRow label="障礙等級" field="disabilityLevel" value={form["disabilityLevel"]} onChange={fld} opts={["","輕度","中度","重度","極重度"]}/>
  </div>
  <div style={{fontSize:12,color:C.muted,marginBottom:12,fontWeight:500}}>地址與居住</div>
  <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px 16px",marginBottom:16}}>
    <FormRow label="戶籍地址" field="registeredAddr" value={form["registeredAddr"]} onChange={fld}/>
    <FormRow label="居住地址" field="addr" value={form["addr"]} onChange={fld}/>
    <FormRow label="居住狀況" field="livingStatus" value={form["livingStatus"]} onChange={fld}/>
    <FormRow label="獨居" field="livingAlone" value={form["livingAlone"]} onChange={fld} opts={["","是","否"]}/>
    <FormRow label="雙老" field="elderlyCouple" value={form["elderlyCouple"]} onChange={fld} opts={["","是","否"]}/>
  </div>
  <div style={{fontSize:12,color:C.muted,marginBottom:12,fontWeight:500}}>聯繫資訊</div>
  <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px 16px",marginBottom:16}}>
    <FormRow label="本人電話" field="phone" value={form["phone"]} onChange={fld}/>
    <FormRow label="備用電話" field="phone2" value={form["phone2"]} onChange={fld}/>
    <FormRow label="緊急聯絡人" field="emergencyContact" value={form["emergencyContact"]} onChange={fld}/>
    <FormRow label="緊急聯絡人關係" field="emergencyRelation" value={form["emergencyRelation"]} onChange={fld}/>
    <FormRow label="緊急聯絡電話" field="emergencyPhone" value={form["emergencyPhone"]} onChange={fld}/>
  </div>
  <div style={{fontSize:12,color:C.muted,marginBottom:12,fontWeight:500}}>進案資訊</div>
  <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px 16px",marginBottom:16}}>
    <FormRow label="來源" field="source" value={form["source"]} onChange={fld}/>
    <FormRow label="轉介單位" field="referralUnit" value={form["referralUnit"]} onChange={fld}/>
    <FormRow label="進案時間" field="caseInDate" value={form["caseInDate"]} onChange={fld} type="date"/>
    <FormRow label="派案時間" field="assignDate" value={form["assignDate"]} onChange={fld} type="date"/>
    <FormRow label="應完成訪評日" field="evalDueDate" value={form["evalDueDate"]} onChange={fld} type="date"/>
    <FormRow label="開案時間" field="openDate" value={form["openDate"]} onChange={fld} type="date"/>
    <FormRow label="系統分案等級" field="systemLevel" value={form["systemLevel"]} onChange={fld}/>
    <FormRow label="個案起始等級" field="initialLevel" value={form["initialLevel"]} onChange={fld}/>
    <FormRow label="基本頻率" field="visitFreq" value={form["visitFreq"]} onChange={fld}/>

          changeLevel:["一","二","三","四","A","B","C","（未填）"],
          disabilityLevel:["極重度","重度","中度","輕度","（未填）"],

        const sortedKeys=[...Object.keys(groups)].sort((a,b)=>{

          if(ai>=0&&bi>=0)return ai-bi;
          if(ai>=0)return -1;
          if(bi>=0)return 1;
          return a.localeCompare(b,"zh-TW");
        });

        return(
          <div>
            {sortedKeys.map(g=>(
              <div key={g} style={{marginBottom:28}}>

                  {groups[g].map(c=><CaseCard key={c.id} c={c}/>)}
                </div>
              </div>
            ))}
          </div>
        );
      })()}
    </div>
  );
}

function DiaryLog({data,setData,onSave,onDelete}){
  const [date,setDate]=useState(toDay());
  const [content,setContent]=useState("");
  const [saved,setSaved]=useState(false);
  const existing=data.diary.find(d=>d.date===date);
  const thisYear=new Date().getFullYear();
  const holidays=useHolidays([thisYear,thisYear+1]);
  const todayHoliday=getHolidayName(date,holidays);
  useEffect(()=>{setContent(existing?.content||"");setSaved(false);},[date]);
  const save=async()=>{
    const entry={date,content,id:existing?.id||uid()};
    setData(d=>{const rest=d.diary.filter(x=>x.date!==date);return content.trim()?{...d,diary:[...rest,entry]}:{...d,diary:rest};});
    if(content.trim())await onSave("diary",entry);else if(existing)await onDelete("diary",existing.id);
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };
  const del=async()=>{if(!confirm("確定刪除？"))return;setData(d=>({...d,diary:d.diary.filter(x=>x.date!==date)}));if(existing)await onDelete("diary",existing.id);setContent("");};
  const sorted=[...data.diary].sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  return(
    <div>
      <H1>工作日誌</H1>
      <div className="grid-2col" style={{display:"grid",gridTemplateColumns:"1fr 280px",gap:24}}>
        <Card>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)} style={{...inp(),maxWidth:180}}/>
            <span style={{fontSize:13,color:C.muted}}>{new Date(date+"T00:00:00").toLocaleDateString("zh-TW",{weekday:"long"})}</span>
            {todayHoliday&&<span style={{fontSize:12,fontWeight:600,color:"#C04040",background:"#FFF0F0",border:"1px solid #ECC8C8",padding:"3px 10px",borderRadius:20}}>🎌 {todayHoliday}</span>}
          </div>
          <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="記錄今日工作事項、訪視摘要、心得、待辦..." style={{...inp(),height:320,resize:"vertical",lineHeight:1.85}}/>
          <div style={{display:"flex",alignItems:"center",gap:12,marginTop:16}}><Btn onClick={save}>儲存日誌</Btn>{saved&&<span style={{fontSize:12,color:C.primary}}>✓ 已儲存</span>}{existing&&<Btn variant="danger" onClick={del}>刪除</Btn>}</div>
        </Card>
        <div>
          <div style={{fontSize:12,fontWeight:600,color:C.muted,marginBottom:12,letterSpacing:"0.05em"}}>過去日誌</div>
          {sorted.length===0&&<div style={{fontSize:13,color:C.muted}}>尚無日誌</div>}
          <div style={{maxHeight:420,overflowY:"auto"}}>{sorted.map(d=>(<div key={d.date} onClick={()=>setDate(d.date)} style={{background:d.date===date?C.primary:C.card,borderRadius:10,border:`1px solid ${C.border}`,padding:"12px 14px",marginBottom:8,cursor:"pointer"}}><div style={{fontSize:12,fontWeight:600,color:d.date===date?"#fff":C.muted,marginBottom:3}}>{fmtDate(d.date)} {new Date(d.date+"T00:00:00").toLocaleDateString("zh-TW",{weekday:"short"})}</div><div style={{fontSize:12,color:d.date===date?"rgba(255,255,255,0.8)":C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.content}</div></div>))}</div>
        </div>
      </div>
    </div>
  );
}
