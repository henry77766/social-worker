function TimePicker({value,onChange,placeholder="選擇時間"}){
  const [open,setOpen]=useState(false);
  const [inputVal,setInputVal]=useState("");
  const [pos,setPos]=useState({x:0,y:0,up:false});
  const ref=useRef(null);
  const inputRef=useRef(null);
  const pad=n=>String(n).padStart(2,"0");

  const times=[];
  for(let h=0;h<24;h++)for(let m=0;m<60;m+=5)times.push(`${pad(h)}:${pad(m)}`);

  const fmt=(t)=>{if(!t)return"";const[h,m]=t.split(":").map(Number);return`${h<12?"上午":"下午"}${h%12===0?12:h%12}:${pad(m)}`;};

  // 過濾選項：依輸入文字篩選
  const filtered=inputVal
    ? times.filter(t=>fmt(t).includes(inputVal)||t.includes(inputVal))
    : times;

  useEffect(()=>{
    if(!open)return;
    const close=(e)=>{if(ref.current&&!ref.current.contains(e.target)){setOpen(false);setInputVal("");}};
    document.addEventListener("mousedown",close);
    return()=>document.removeEventListener("mousedown",close);
  },[open]);

  useEffect(()=>{
    if(open&&!inputVal&&ref.current){
      const sel=ref.current.querySelector(".sel-t");
      if(sel)sel.scrollIntoView({block:"center"});
    }
  },[open]);

  const handleFocus=(e)=>{
    const r=e.currentTarget.getBoundingClientRect();
    const up=window.innerHeight-r.bottom<240;
    setPos({x:r.left,y:up?r.top-4:r.bottom+4,up});
    setOpen(true);
    setInputVal("");
  };

  const handleInput=(e)=>{
    setInputVal(e.target.value);
    setOpen(true);
  };

  const select=(t)=>{
    onChange(t);
    setInputVal("");
    setOpen(false);
  };

  const displayVal=open?inputVal:(value?fmt(value):"");

  return(
    <div style={{position:"relative"}} ref={ref}>
      <div style={{...inp(),display:"flex",alignItems:"center",padding:0,overflow:"hidden"}}>
        <input ref={inputRef}
          value={displayVal}
          onChange={handleInput}
          onFocus={handleFocus}
          placeholder={placeholder}
          style={{flex:1,border:"none",outline:"none",background:"transparent",fontSize:14,fontFamily:font,color:C.text,padding:"8px 12px"}}/>
        {value&&!open
          ? <button onClick={e=>{e.stopPropagation();onChange("");}} style={{background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,padding:"0 10px",flexShrink:0}}>✕</button>
          : <span style={{fontSize:11,color:C.muted,padding:"0 10px",flexShrink:0}}>▾</span>
        }
      </div>
      {open&&filtered.length>0&&(
        <div style={{position:"fixed",left:pos.x,top:pos.up?undefined:pos.y,bottom:pos.up?(window.innerHeight-pos.y):undefined,
          zIndex:3000,background:C.card,border:`1px solid ${C.border}`,borderRadius:10,
          boxShadow:"0 6px 24px rgba(0,0,0,0.15)",width:150,maxHeight:220,overflowY:"auto"}}>
          {filtered.map(t=>(
            <div key={t} className={value===t?"sel-t":""} onMouseDown={()=>select(t)}
              style={{padding:"10px 16px",fontSize:14,cursor:"pointer",
                background:value===t?C.primary:"transparent",
                color:value===t?"#fff":C.text,fontWeight:value===t?600:400}}>
              {fmt(t)}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function CalendarView({data,setData,onSave,onDelete}){
  const today=toDay();
  // ── 所有 hooks 集中在最頂部 ──────────────────────────
  const [cur,setCur]=useState(()=>{const d=new Date();return{y:d.getFullYear(),m:d.getMonth()};});
  const [sel,setSel]=useState(today);
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [viewId,setViewId]=useState(null);
  const [menuId,setMenuId]=useState(null);
  const [menuPos,setMenuPos]=useState({x:0,y:0});
  const [form,setForm]=useState({title:"",type:"訪視",time:"",note:""});
  const [gcalEvents,setGcalEvents]=useState([]);
  const [gcalLoading,setGcalLoading]=useState(false);
  const [gcalError,setGcalError]=useState(null);
  const [gcalEnabled,setGcalEnabled]=useState(()=>localStorage.getItem("gcal_enabled")==="1");
  const initDone=useRef(false);

  // 載入 Google 日曆事件



  // 解析 iCal 格式（內嵌在函式中避免 not defined 問題）
  const fetchGcal=async()=>{
    if(!gcalEnabled)return;
    const icalUrl=localStorage.getItem("gcal_ical_url")||"";
    if(!icalUrl){setGcalError("請先在「⚙ 用戶設定」填入 iCal 網址");return;}
    setGcalLoading(true);setGcalError(null);

    // iCal 解析函式
    const doParseIcal=(text)=>{
      const evts=[];
      const pad2=n=>String(n).padStart(2,"0");
      text.split("BEGIN:VEVENT").slice(1).forEach(block=>{
        const get=(key)=>{const m=block.match(new RegExp(key+"[^:]*:([^\r\n]+)"));return m?m[1].trim():"";};
        const summary=get("SUMMARY").replace(/\\n/g," ").replace(/\\,/g,",");
        const dtstart=get("DTSTART");
        const dtend=get("DTEND");
        const desc=get("DESCRIPTION");
        if(!dtstart||!summary)return;
        let date="",timeStart="",timeEnd="";
        if(dtstart.includes("T")){
          const raw=dtstart.replace("Z","");
          date=raw.slice(0,4)+"-"+raw.slice(4,6)+"-"+raw.slice(6,8);
          timeStart=raw.slice(9,11)+":"+raw.slice(11,13);
          if(dtend.includes("T")){
            const re=dtend.replace("Z","");
            timeEnd=re.slice(9,11)+":"+re.slice(11,13);
          }
        }else{
          date=dtstart.slice(0,4)+"-"+dtstart.slice(4,6)+"-"+dtstart.slice(6,8);
        }
        if(date)evts.push({title:summary,date,timeStart,timeEnd,description:desc});
      });
      return evts;
    };

    try{
      // 直接 fetch iCal（公開日曆不需要 proxy）
      const webcalUrl=icalUrl.replace("webcal://","https://");
      const res=await fetch(webcalUrl,{mode:"cors"});
      if(!res.ok)throw new Error("HTTP "+res.status);
      const text=await res.text();
      const events=doParseIcal(text);
      const pad=n=>String(n).padStart(2,"0");
      const monthStr=`${cur.y}-${pad(cur.m+1)}`;
      setGcalEvents(events.filter(e=>e.date.startsWith(monthStr)));
      setGcalError(null);
    }catch(e){
      // CORS 失敗時改用 proxy
      try{
        const webcalUrl=icalUrl.replace("webcal://","https://");
        const res=await fetch("https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(webcalUrl));
        const text=await res.text();
        const events=doParseIcal(text);
        const pad=n=>String(n).padStart(2,"0");
        const monthStr=`${cur.y}-${pad(cur.m+1)}`;
        setGcalEvents(events.filter(e=>e.date.startsWith(monthStr)));
        setGcalError(null);
      }catch(e2){
        console.error("GCal iCal error:",e2);
        setGcalError("無法載入 Google 日曆，請確認日曆已設為公開");
      }
    }finally{setGcalLoading(false);}
  };

  useEffect(()=>{if(gcalEnabled)fetchGcal();},[gcalEnabled,cur.y,cur.m]);

  // 點選其他地方關閉選單
  useEffect(()=>{
    if(!menuId)return;
    const close=()=>setMenuId(null);
    document.addEventListener("click",close);
    return()=>document.removeEventListener("click",close);
  },[menuId]);
  const thisYear=new Date().getFullYear();
  const holidays=useHolidays([thisYear,thisYear+1]);

  useEffect(()=>{
    if(initDone.current)return;
    if((data.events||[]).length===0){
      initDone.current=true;
      const newEvts=TAIWAN_HOLIDAYS.map(h=>({id:uid(),date:h.date,title:h.title,type:"節日",time:"",note:""}));
      setData(d=>({...d,events:newEvts}));
      newEvts.forEach(e=>onSave("events",e));
    }
  },[data.events]);

  // ── 一般函式 ──────────────────────────────────────────
  const blank={title:"",type:"訪視",timeStart:"",timeEnd:"",note:""};
  const fld=(k,v)=>setForm(f=>({...f,[k]:v}));

  const loadHolidays=async()=>{
    const existing=(data.events||[]).filter(e=>e.type!=="節日");
    const newEvts=TAIWAN_HOLIDAYS.map(h=>({id:uid(),date:h.date,title:h.title,type:"節日",time:"",note:""}));
    setData(d=>({...d,events:[...existing,...newEvts]}));
    for(const e of newEvts){await onSave("events",e);}
  };

  const clearHolidays=async()=>{
    if(!confirm("確定清除所有國定假日？"))return;
    const toRemove=(data.events||[]).filter(e=>e.type==="節日");
    setData(d=>({...d,events:(d.events||[]).filter(e=>e.type!=="節日")}));
    for(const e of toRemove){await onDelete("events",e.id);}
  };

  const daysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
  const firstDow=(y,m)=>new Date(y,m,1).getDay();
  const totalDays=daysInMonth(cur.y,cur.m);
  const startDow=firstDow(cur.y,cur.m);
  const cells=[];
  for(let i=0;i<startDow;i++)cells.push(null);
  for(let d=1;d<=totalDays;d++)cells.push(d);

  const pad=n=>String(n).padStart(2,"0");
  const dateStr=(d)=>`${cur.y}-${pad(cur.m+1)}-${pad(d)}`;
  const evtsOn=(date)=>(data.events||[]).filter(e=>e.date===date);
  const gcalOn=(date)=>gcalEvents.filter(e=>e.date===date);
  const visitsOn=(date)=>data.visits.filter(v=>v.nextVisit===date);

  const prevMonth=()=>setCur(c=>{const m=c.m-1;return m<0?{y:c.y-1,m:11}:{y:c.y,m};});
  const nextMonth=()=>setCur(c=>{const m=c.m+1;return m>11?{y:c.y+1,m:0}:{y:c.y,m};});
  const goToday=()=>{const d=new Date();setCur({y:d.getFullYear(),m:d.getMonth()});setSel(today);};

  const saveEvt=async()=>{
    if(!form.title.trim()){alert("請填寫事件標題");return;}
    const evt={...form,date:sel,id:uid()};
    setData(d=>({...d,events:[...(d.events||[]),evt]}));
    await onSave("events",evt);
    setForm(blank);setShowForm(false);
  };

  const delEvt=async(id)=>{
    if(!confirm("確定刪除？"))return;
    setData(d=>({...d,events:(d.events||[]).filter(e=>e.id!==id)}));
    await onDelete("events",id);
  };

  const startEdit=(e)=>{
    setEditId(e.id);
    setForm({title:e.title,type:e.type,date:e.date||"",timeStart:e.timeStart||"",timeEnd:e.timeEnd||"",note:e.note||""});
    setShowForm(false);
  };
  const cancelEdit=()=>{setEditId(null);setForm(blank);};
  const saveEdit=async()=>{
    if(!form.title.trim()){alert("請填寫事件標題");return;}
    const updated={...(data.events||[]).find(e=>e.id===editId),...form,id:editId,date:form.date||(data.events||[]).find(e=>e.id===editId)?.date};
    setData(d=>({...d,events:(d.events||[]).map(e=>e.id===editId?updated:e)}));
    await onSave("events",updated);
    setEditId(null);setForm(blank);
  };

  const selEvts=[...(evtsOn(sel))].sort((a,b)=>(a.time||"").localeCompare(b.time||""));
  const selVisits=visitsOn(sel);
  const rocYear=cur.y-1911;

  return(
    <div>
      {/* 頂部 */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
        <h1 style={{fontSize:22,fontWeight:700,fontFamily:serif,color:C.text,margin:0}}>{rocYear} 年 {cur.m+1} 月</h1>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>{
              const url=localStorage.getItem("gcal_ical_url")||"";
              if(!gcalEnabled&&!url){
                setGcalError("請先在「⚙ 用戶設定」填入 Google 日曆 iCal 網址");
                return;
              }
              const v=!gcalEnabled;setGcalEnabled(v);localStorage.setItem("gcal_enabled",v?"1":"0");
            }}
            style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${gcalEnabled?"#4285F4":C.border}`,background:gcalEnabled?"#EEF3FF":C.card,color:gcalEnabled?"#4285F4":C.muted,fontSize:12,cursor:"pointer",fontFamily:font,display:"flex",alignItems:"center",gap:5}}>
            <span style={{fontSize:13}}>📅</span>{gcalEnabled?"Google 日曆已開":"同步 Google 日曆"}
            {gcalLoading&&<span style={{fontSize:10}}>⏳</span>}
          </button>
          {gcalEnabled&&<button onClick={fetchGcal} style={{padding:"6px 10px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.muted,fontSize:12,cursor:"pointer"}} title="重新整理">↻</button>}
          <button onClick={goToday} style={{padding:"6px 14px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.text,fontSize:12,cursor:"pointer",fontFamily:font}}>今天</button>
          <button onClick={prevMonth} style={{width:32,height:32,borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.text,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
          <button onClick={nextMonth} style={{width:32,height:32,borderRadius:8,border:`1px solid ${C.border}`,background:C.card,color:C.text,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
        </div>
      </div>

      {/* 月曆 */}
      <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden",marginBottom:16}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:C.cardAlt,borderBottom:`1px solid ${C.border}`}}>
          {["日","一","二","三","四","五","六"].map((d,i)=>(
            <div key={d} style={{textAlign:"center",fontSize:13,fontWeight:700,color:i===0?"#C04040":i===6?"#4A6E8A":C.muted,padding:"10px 0"}}>{d}</div>
          ))}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gridAutoRows:"minmax(120px,auto)"}}>
          {cells.map((d,i)=>{
            if(!d)return<div key={`e${i}`} style={{borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,minHeight:90}}/>;
            const ds=dateStr(d);
            const evts=evtsOn(ds);
            const vis=visitsOn(ds);
            const isToday=ds===today;
            const isSel=ds===sel;
            const colIdx=(startDow+d-1)%7;
            const isSun=colIdx===0,isSat=colIdx===6;
            const holiday=holidays[ds];
            return(
              <div key={d} onClick={()=>{setSel(ds);setEditId(null);setShowForm(false);}}
                style={{height:"100%",padding:"6px 8px",cursor:"pointer",overflow:"hidden",
                  borderRight:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,
                  background:isSel?"#EBF4F0":isToday?"#FFF8F0":C.card,
                  outline:isSel?`2px solid ${C.primary}`:"none",outlineOffset:-2}}>
                <div style={{fontSize:14,fontWeight:isToday||isSel?700:500,
                  color:isSun?"#C04040":isSat?"#4A6E8A":isSel?C.primary:isToday?C.accent:C.text,
                  marginBottom:holiday?1:4}}>{d}</div>
                {holiday&&<div style={{fontSize:11,color:"#C04040",fontWeight:600,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{holiday}</div>}
                {(()=>{
                  const localEvts=evts.filter(e=>e.type!=="節日");
                  const gEvts=gcalOn(ds);
                  const allEvts=[...localEvts.map(e=>({...e,_src:"local"})),...gEvts.map(e=>({...e,_src:"gcal"}))];
                  const shown=allEvts.slice(0,3);
                  const restN=allEvts.length-shown.length+(vis.length>0&&allEvts.length<3?0:vis.length>0?1:0);
                  return(
                    <div style={{display:"flex",flexDirection:"column",gap:2}}>
                      {shown.map((ev,idx)=>ev._src==="gcal"?(
                        <div key={"g"+idx} style={{borderRadius:3,background:"#4285F4",
                          padding:"3px 6px",fontSize:12,color:"#fff",fontWeight:500,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:"18px"}}>
                          {ev.title}
                        </div>
                      ):(
                        <div key={ev.id} style={{borderRadius:3,background:EVT_COLORS[ev.type]||C.muted,
                          padding:"3px 6px",fontSize:12,color:"#fff",fontWeight:600,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:"18px"}}>
                          {ev.title}
                        </div>
                      ))}
                      {allEvts.length<3&&vis.length>0&&<div style={{borderRadius:3,background:"#AAB8C2",padding:"3px 6px",fontSize:12,color:"#fff",fontWeight:600,lineHeight:"18px"}}>預排訪視</div>}
                      {restN>0&&<div
                        onClick={ev=>{ev.stopPropagation();setSel(ds);setEditId(null);setShowForm(false);setTimeout(()=>{const el=document.querySelector(".detail-panel");if(el){el.scrollIntoView({behavior:"smooth",block:"nearest"});el.style.outline="2px solid "+C.primary;setTimeout(()=>el.style.outline="",1000);}},200);}}
                        style={{fontSize:11,color:C.primary,lineHeight:"18px",fontWeight:600,cursor:"pointer",textDecoration:"underline"}}>
                        還有 {restN} 個
                      </div>}
                    </div>
                  );
                })()}
              </div>
            );
          })}
        </div>
      </div>

      {/* 圖例 */}
      <div style={{display:"flex",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        {EVT_TYPES.map(t=>(<div key={t} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted}}><div style={{width:8,height:8,borderRadius:"50%",background:EVT_COLORS[t]}}/>{t}</div>))}
        <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:C.muted}}><div style={{width:8,height:8,borderRadius:"50%",background:"#AAB8C2"}}/>預排訪視</div>
        {gcalEnabled&&<div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#4285F4"}}><div style={{width:8,height:8,borderRadius:"50%",background:"#4285F4"}}/>Google 日曆</div>}
      </div>

      {/* 選取日詳情 */}
      <div className="detail-panel" style={{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,overflow:"hidden"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px",background:C.cardAlt,borderBottom:`1px solid ${C.border}`}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:15,fontWeight:700,color:C.text}}>{fmtDate(sel)}</span>
            <span style={{fontSize:12,color:C.muted}}>{new Date(sel+"T00:00:00").toLocaleDateString("zh-TW",{weekday:"long"})}</span>
            {selEvts.filter(e=>e.type!=="節日").length>0&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:20,background:"#EEF7F3",color:C.primary}}>{selEvts.filter(e=>e.type!=="節日").length} 個行程</span>}
          </div>
          <Btn onClick={()=>{setShowForm(v=>!v);setForm(blank);setEditId(null);}} variant={showForm?"secondary":"primary"} style={{padding:"6px 16px",fontSize:12}}>
            {showForm?"取消":"＋ 新增"}
          </Btn>
        </div>
        <div style={{padding:"14px 20px",overflowX:"visible"}}>
          {showForm&&(
            <div style={{background:C.cardAlt,borderRadius:10,padding:"16px",marginBottom:14,border:`1px solid ${C.border}`}}>
              <div style={{marginBottom:10}}><Label>標題 *</Label><input value={form.title} onChange={e=>fld("title",e.target.value)} placeholder="事件標題" style={inp()}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                <div style={{gridColumn:"span 2"}}><Label>類型</Label><select value={form.type} onChange={e=>fld("type",e.target.value)} style={inp()}>{EVT_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
                <div><Label>開始時間</Label><TimePicker value={form.timeStart||""} onChange={v=>fld("timeStart",v)}/></div>
                <div><Label>結束時間</Label><TimePicker value={form.timeEnd||""} onChange={v=>fld("timeEnd",v)}/></div>
              </div>
              <div style={{marginBottom:12}}><Label>備註</Label><textarea value={form.note} onChange={e=>fld("note",e.target.value)} rows={2} style={{...inp(),resize:"vertical"}}/></div>
              <Btn onClick={saveEvt} style={{width:"100%"}}>儲存事件</Btn>
            </div>
          )}
          {selVisits.map(v=>(
            <div key={v.id} style={{background:"#F0F4F8",borderRadius:10,border:"1px solid #C8D8E8",padding:"12px 14px",marginBottom:8,borderLeft:"3px solid #5B8DB8"}}>
              <div style={{fontSize:11,fontWeight:600,color:"#5B8DB8",marginBottom:4}}>📅 預排訪視</div>
              <div style={{fontSize:13,color:C.text,fontWeight:500}}>{data.cases.find(c=>c.id===v.caseId)?.name||"（未知）"}</div>
              {v.followup&&<div style={{fontSize:11,color:C.muted,marginTop:3}}>{v.followup}</div>}
            </div>
          ))}
          {gcalOn(sel).map((e,i)=>(
            <div key={"gcal"+i} style={{background:"#EEF3FF",borderRadius:10,border:"1px solid #C5D5F5",padding:"12px 14px",marginBottom:8,borderLeft:"3px solid #4285F4"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:e.description?4:0}}>
                <span style={{fontSize:11,fontWeight:700,color:"#4285F4"}}>📅 Google 日曆</span>
                {(e.timeStart||e.timeEnd)&&<span style={{fontSize:11,color:"#4285F4"}}>🕐 {e.timeStart}{e.timeEnd?` - ${e.timeEnd}`:""}</span>}
              </div>
              <div style={{fontSize:13,fontWeight:600,color:"#1A3A8A"}}>{e.title}</div>
              {e.description&&<div style={{fontSize:11,color:"#4285F4",marginTop:3}}>{e.description}</div>}
            </div>
          ))}
          {gcalError&&<div style={{fontSize:12,color:C.danger,padding:"8px 0"}}>{gcalError}</div>}
          {selEvts.filter(e=>e.type!=="節日").length===0&&selVisits.length===0&&gcalOn(sel).length===0&&!showForm&&(
            <div style={{fontSize:13,color:C.muted,textAlign:"center",padding:"24px 0"}}>這天沒有安排<br/><span style={{fontSize:11}}>點「＋ 新增」來加入事件</span></div>
          )}
          {selEvts.filter(e=>e.type!=="節日").map(e=>(
            <div key={e.id} style={{background:C.card,borderRadius:10,border:`1.5px solid ${editId===e.id?C.primary:C.border}`,padding:"12px 14px",marginBottom:8,borderLeft:`3px solid ${EVT_COLORS[e.type]||C.muted}`,position:"relative"}}>
              {editId===e.id?(
                <div>
                  <div style={{fontSize:12,fontWeight:600,color:C.primary,marginBottom:10}}>編輯事件</div>
                  <div style={{marginBottom:8}}><Label>日期</Label><input type="date" value={form.date||""} onChange={ev=>fld("date",ev.target.value)} style={inp()}/></div>
                  <div style={{marginBottom:8}}><Label>標題 *</Label><input value={form.title} onChange={ev=>fld("title",ev.target.value)} style={inp()}/></div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
                    <div style={{gridColumn:"span 2"}}><Label>類型</Label><select value={form.type} onChange={ev=>fld("type",ev.target.value)} style={inp()}>{EVT_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
                    <div><Label>開始時間</Label><TimePicker value={form.timeStart||""} onChange={v=>fld("timeStart",v)}/></div>
                    <div><Label>結束時間</Label><TimePicker value={form.timeEnd||""} onChange={v=>fld("timeEnd",v)}/></div>
                  </div>
                  <div style={{marginBottom:10}}><Label>備註</Label><textarea value={form.note} onChange={ev=>fld("note",ev.target.value)} rows={2} style={{...inp(),resize:"vertical"}}/></div>
                  <div style={{display:"flex",gap:8}}>
                    <Btn onClick={saveEdit} style={{flex:1,padding:"7px"}}>儲存</Btn>
                    <Btn variant="secondary" onClick={cancelEdit} style={{padding:"7px 12px"}}>取消</Btn>
                  </div>
                </div>
              ):(
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1,cursor:"pointer"}} onClick={()=>setViewId(v=>v===e.id?null:e.id)}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                        <span style={{fontSize:13,fontWeight:600,color:C.text}}>{e.title}</span>
                        <span style={{fontSize:10,padding:"1px 7px",borderRadius:10,background:(EVT_COLORS[e.type]||C.muted)+"22",color:EVT_COLORS[e.type]||C.muted,fontWeight:600}}>{e.type}</span>
                      </div>
                      {(e.timeStart||e.timeEnd)&&<div style={{fontSize:11,color:C.muted}}>🕐 {e.timeStart||""}{e.timeEnd?` - ${e.timeEnd}`:""}</div>}
                    </div>
                    <div style={{flexShrink:0,paddingLeft:8,position:"relative"}}>
                      <button onClick={ev=>{ev.stopPropagation();const r=ev.currentTarget.getBoundingClientRect();setMenuPos({x:r.right,y:r.bottom});setMenuId(v=>v===e.id?null:e.id);}}
                        style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,cursor:"pointer",color:menuId===e.id?C.primary:C.muted,fontSize:13,padding:"2px 8px",lineHeight:1}}>⋮</button>
                      {menuId===e.id&&(
                        <div onClick={ev=>ev.stopPropagation()}
                          style={{position:"fixed",left:Math.min(menuPos.x-130,window.innerWidth-140),top:menuPos.y+140>window.innerHeight?menuPos.y-148:menuPos.y+4,background:C.card,borderRadius:12,border:`1px solid ${C.border}`,boxShadow:"0 8px 28px rgba(0,0,0,0.18)",zIndex:2000,minWidth:130,overflow:"hidden"}}>
                          <button onClick={()=>{startEdit(e);setMenuId(null);}}
                            style={{width:"100%",padding:"11px 18px",background:"none",border:"none",cursor:"pointer",fontSize:13,fontFamily:font,color:C.text,textAlign:"left",display:"flex",alignItems:"center",gap:9}}>✏️ 編輯</button>
                          <button onClick={()=>{const copy={...e,id:uid(),title:`${e.title}（複製）`};setData(d=>({...d,events:[...d.events,copy]}));onSave("events",copy);setMenuId(null);}}
                            style={{width:"100%",padding:"11px 18px",background:"none",border:"none",cursor:"pointer",fontSize:13,fontFamily:font,color:C.text,textAlign:"left",display:"flex",alignItems:"center",gap:9,borderTop:`1px solid ${C.border}`}}>⧉ 複製</button>
                          <button onClick={()=>{delEvt(e.id);setMenuId(null);}}
                            style={{width:"100%",padding:"11px 18px",background:"none",border:"none",cursor:"pointer",fontSize:13,fontFamily:font,color:C.danger,textAlign:"left",display:"flex",alignItems:"center",gap:9,borderTop:`1px solid ${C.border}`}}>✕ 刪除</button>
                        </div>
                      )}
                    </div>
                  </div>

                  {viewId===e.id&&(
                    <div style={{marginTop:10,padding:"10px 12px",background:C.cardAlt,borderRadius:8,fontSize:12,color:C.text,lineHeight:1.8}}>
                      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:4}}>
                        <span style={{color:C.muted}}>📅</span><span style={{fontWeight:500}}>{fmtDate(e.date)}</span>
                        {(e.timeStart||e.timeEnd)&&<span style={{color:C.muted}}>🕐 {e.timeStart||""}{e.timeEnd?` - ${e.timeEnd}`:""}</span>}
                      </div>
                      {e.note?<div style={{color:C.muted,whiteSpace:"pre-wrap"}}>{e.note}</div>:<div style={{color:C.border}}>（無備註）</div>}
                    </div>
                  )}
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}



// ── CASE RECORDS MODAL ──────────────────────────────────────────
const CONTACT_METHODS=["電訪","家訪","晤談","外訪","代辦","陪同","簡訊","個研","函件","其他"];
const CONTACT_METHOD_COLOR={"電訪":"#E8F0FB","家訪":"#E8F5EE","晤談":"#F0EBF8","外訪":"#FFF0E8","代辦":"#FFF8E0","陪同":"#E8F8F0","簡訊":"#FFF4E8","個研":"#EBF0FF","函件":"#F5EDE8","其他":"#F0F0EE"};
const CONTACT_METHOD_TEXT={"電訪":"#3A5FAA","家訪":"#2A7A4A","晤談":"#6A3A9A","外訪":"#9A4A1A","代辦":"#8A6A10","陪同":"#1A7A5A","簡訊":"#AA6020","個研":"#2A4A9A","函件":"#7A4A2A","其他":C.muted};

function CaseRecordsModal({caseData,caseRecords,setData,onSave,onDelete,onClose}){
  const records=[...(caseRecords||[]).filter(r=>r.caseId===caseData.id)]
    .sort((a,b)=>(b.date||"").localeCompare(a.date||""));

  const blank={date:toDay(),contactPerson:"",resourceUnit:"",contactMethod:"電訪",contactCount:"1",content:""};
  const [showAdd,setShowAdd]=useState(false);
  const [addRec,setAddRec]=useState(blank);
  const [editId,setEditId]=useState(null);
  const [editRec,setEditRec]=useState({});
  const [page,setPage]=useState(1);
  const [viewRec,setViewRec]=useState(null);
  const PAGE=10;
  const totalPages=Math.max(1,Math.ceil(records.length/PAGE));
  const paged=records.slice((page-1)*PAGE,page*PAGE);

  const fldAdd=(k,v)=>setAddRec(r=>({...r,[k]:v}));
  const fldEdit=(k,v)=>setEditRec(r=>({...r,[k]:v}));

  const handleAdd=async()=>{
    if(!addRec.contactPerson.trim()&&!addRec.content.trim()){alert("請填寫聯繫對象或聯繫內容");return;}
    const item={...addRec,id:uid(),caseId:caseData.id,createdBy:(typeof currentUserName!=="undefined"?currentUserName:"社工"),createdDate:toDay(),lastModified:toDay()};
    setData(d=>({...d,caseRecords:[...(d.caseRecords||[]),item]}));
    await onSave("caseRecords",item);
    setAddRec(blank);setShowAdd(false);
  };
  const handleEdit=async()=>{
    const updated={...editRec,lastModified:toDay()};
    setData(d=>({...d,caseRecords:(d.caseRecords||[]).map(r=>r.id===editId?updated:r)}));
    await onSave("caseRecords",updated);
    setEditId(null);
  };
  const handleDel=async(id)=>{
    if(!confirm("確定刪除此筆紀錄？"))return;
    setData(d=>({...d,caseRecords:(d.caseRecords||[]).filter(r=>r.id!==id)}));
    await onDelete("caseRecords",id);
  };

  const MethodBadge=({m})=>(
    <span style={{padding:"2px 10px",borderRadius:20,fontSize:11,fontWeight:600,
      background:CONTACT_METHOD_COLOR[m]||"#EEE",color:CONTACT_METHOD_TEXT[m]||C.muted}}>
      {m}
    </span>
  );

  // 行內編輯列
  // EditRow inlined below to prevent focus loss

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(26,51,50,0.55)",zIndex:1500,display:"flex",alignItems:"flex-start",justifyContent:"center",overflowY:"auto",padding:"24px 16px"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:C.card,borderRadius:16,width:"min(1040px,98vw)",boxShadow:"0 20px 60px rgba(0,0,0,0.25)",overflow:"hidden"}}>

        {/* ── Header ── */}
        <div style={{background:C.sidebar,padding:"20px 28px",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",letterSpacing:"0.12em",marginBottom:4}}>個案聯繫紀錄</div>
            <div style={{fontSize:18,fontWeight:700,color:"#fff",fontFamily:serif}}>{caseData.name}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginTop:2}}>
              {caseData.caseNo||"—"}
              {caseData.status&&<span style={{marginLeft:8,padding:"1px 8px",borderRadius:10,background:"rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.7)"}}>{caseData.status}</span>}
            </div>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <div style={{display:"flex",gap:12,fontSize:12,color:"rgba(255,255,255,0.5)"}}>
              <span>共 {records.length} 筆紀錄</span>
              {records.length>0&&<span>最近：{fmtDate(records[0]?.date)}</span>}
            </div>
            <button onClick={()=>{setShowAdd(v=>!v);setEditId(null);}}
              style={{padding:"8px 18px",borderRadius:8,background:"rgba(201,123,58,0.85)",border:"none",color:"#fff",cursor:"pointer",fontSize:13,fontFamily:font,fontWeight:600}}>
              {showAdd?"取消":"＋ 新增紀錄"}
            </button>
            <button onClick={onClose} style={{background:"rgba(255,255,255,0.12)",border:"none",color:"#fff",borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
          </div>
        </div>

        {/* ── 新增紀錄表單 ── */}
        {showAdd&&(
          <div style={{padding:"18px 24px",background:"#F8F5F0",borderBottom:`2px solid ${C.border}`}}>
            <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:14}}>新增聯繫紀錄</div>
            <div style={{display:"grid",gridTemplateColumns:"130px 1fr 1fr auto auto",gap:"10px 12px",alignItems:"end",marginBottom:12}}>
              <div>
                <Label>日期</Label>
                <input type="date" value={addRec.date} onChange={e=>fldAdd("date",e.target.value)} style={inp()}/>
              </div>
              <div>
                <Label>聯繫對象</Label>
                <input value={addRec.contactPerson} onChange={e=>fldAdd("contactPerson",e.target.value)} placeholder="個案本人、家屬、單位…" style={inp()}/>
              </div>
              <div>
                <Label>資源聯繫單位</Label>
                <input value={addRec.resourceUnit} onChange={e=>fldAdd("resourceUnit",e.target.value)} placeholder="留空表示無" style={inp()}/>
              </div>
              <div>
                <Label>聯繫方式</Label>
                <select value={addRec.contactMethod} onChange={e=>fldAdd("contactMethod",e.target.value)} style={inp()}>
                  {CONTACT_METHODS.map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
              <div>
                <Label>次數</Label>
                <input type="number" min="1" value={addRec.contactCount} onChange={e=>fldAdd("contactCount",e.target.value)} style={{...inp(),width:72}}/>
              </div>
            </div>
            <div style={{marginBottom:12}}>
              <Label>聯繫內容</Label>
              <textarea value={addRec.content} onChange={e=>fldAdd("content",e.target.value)}
                placeholder="記錄本次聯繫的重點、狀況、後續追蹤事項…"
                rows={3} style={{...inp(),resize:"vertical",lineHeight:1.7}}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn onClick={handleAdd}>💾 儲存紀錄</Btn>
              <Btn variant="secondary" onClick={()=>setShowAdd(false)}>取消</Btn>
            </div>
          </div>
        )}

        {/* ── 聯繫統計小結 ── */}
      {records.length>0&&(()=>{
        const byMethod={};
        records.forEach(r=>{byMethod[r.contactMethod]=(byMethod[r.contactMethod]||0)+parseInt(r.contactCount||1);});
        const totalCount=records.reduce((s,r)=>s+parseInt(r.contactCount||1),0);
        return(
          <div style={{display:"flex",gap:12,padding:"12px 28px",background:"#F8F5F0",borderBottom:`1px solid ${C.border}`,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:12,color:C.muted,fontWeight:600}}>聯繫統計：</span>
            <span style={{fontSize:12,color:C.text}}>總次數 <strong style={{color:C.primary}}>{totalCount}</strong></span>
            {Object.entries(byMethod).map(([m,n])=>(
              <span key={m} style={{fontSize:12,padding:"2px 10px",borderRadius:20,background:CONTACT_METHOD_COLOR[m]||"#EEE",color:CONTACT_METHOD_TEXT[m]||C.muted}}>
                {m} {n}次
              </span>
            ))}
          </div>
        );
      })()}

      {/* ── 表格 ── */}
        <div style={{overflowX:"auto"}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead>
              <tr style={{background:C.cardAlt,borderBottom:`2px solid ${C.border}`}}>
                {["日期","聯繫對象","資源聯繫單位","聯繫方式","次數","動作"].map(h=>(
                  <th key={h} style={{padding:"11px 14px",textAlign:"left",color:C.muted,fontWeight:600,fontSize:12,whiteSpace:"nowrap",borderBottom:`1px solid ${C.border}`}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {records.length===0&&(
                <tr><td colSpan={6} style={{padding:"40px",textAlign:"center",color:C.muted,fontSize:13}}>
                  尚無聯繫紀錄，點擊上方「＋ 新增紀錄」開始記錄
                </td></tr>
              )}
              {paged.map((r,i)=>(
                editId===r.id
                  ? <tr key={r.id} style={{background:"#F8F5F0",borderBottom:`1px solid ${C.border}`}}>
              <td style={{padding:"8px 12px"}}><input type="date" value={editRec.date||""} onChange={e=>fldEdit("date",e.target.value)} style={{...inp(),fontSize:13,padding:"6px 8px"}}/></td>
              <td style={{padding:"8px 12px"}}><input value={editRec.contactPerson||""} onChange={e=>fldEdit("contactPerson",e.target.value)} placeholder="聯繫對象" style={{...inp(),fontSize:13,padding:"6px 8px"}}/></td>
              <td style={{padding:"8px 12px"}}><input value={editRec.resourceUnit||""} onChange={e=>fldEdit("resourceUnit",e.target.value)} placeholder="資源聯繫單位" style={{...inp(),fontSize:13,padding:"6px 8px"}}/></td>
              <td style={{padding:"8px 12px"}}><select value={editRec.contactMethod||"電訪"} onChange={e=>fldEdit("contactMethod",e.target.value)} style={{...inp(),fontSize:13,padding:"6px 8px"}}>{CONTACT_METHODS.map(m=><option key={m}>{m}</option>)}</select></td>
              <td style={{padding:"8px 12px"}}><input type="number" min="1" value={editRec.contactCount||"1"} onChange={e=>fldEdit("contactCount",e.target.value)} style={{...inp(),fontSize:13,padding:"6px 8px",width:64}}/></td>
              <td style={{padding:"8px 12px",whiteSpace:"nowrap"}}><div style={{display:"flex",gap:6}}><button onClick={handleEdit} style={{padding:"5px 12px",borderRadius:6,background:C.primary,color:"#fff",border:"none",cursor:"pointer",fontSize:12,fontFamily:font}}>儲存</button><button onClick={()=>setEditId(null)} style={{padding:"5px 10px",borderRadius:6,background:C.cardAlt,color:C.text,border:`1px solid ${C.border}`,cursor:"pointer",fontSize:12,fontFamily:font}}>取消</button></div></td>
            </tr>
                  : (
                    <tr key={r.id} onClick={()=>setViewRec(viewRec?.id===r.id?null:r)}
                      style={{borderBottom:`1px solid ${C.border}`,background:viewRec?.id===r.id?"#EEF7F3":i%2===0?C.card:C.cardAlt,transition:"background 0.1s",cursor:"pointer"}}
                      onMouseEnter={e=>e.currentTarget.style.background="#F0F7F4"}
                      onMouseLeave={e=>e.currentTarget.style.background=viewRec?.id===r.id?"#EEF7F3":i%2===0?C.card:C.cardAlt}>
                      <td style={{padding:"12px 14px",whiteSpace:"nowrap",color:C.primary,fontWeight:500}}>{fmtDate(r.date)}</td>
                      <td style={{padding:"12px 14px",fontWeight:600,color:C.text}}>{r.contactPerson||<span style={{color:C.border}}>—</span>}</td>
                      <td style={{padding:"12px 14px",color:C.muted}}>{r.resourceUnit||<span style={{color:C.border}}>—</span>}</td>
                      <td style={{padding:"12px 14px"}}><MethodBadge m={r.contactMethod||"電訪"}/></td>
                      <td style={{padding:"12px 14px",textAlign:"center",color:C.text,fontWeight:600}}>{r.contactCount||1}</td>
                      <td style={{padding:"12px 14px",whiteSpace:"nowrap"}}>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={e=>{e.stopPropagation();setEditId(r.id);setEditRec({...r});setShowAdd(false);setViewRec(null);}}
                            style={{padding:"4px 10px",borderRadius:6,background:"#EBF5FF",color:"#2A5FA8",border:"1px solid #C0D8F0",cursor:"pointer",fontSize:12,fontFamily:font}}>✏️</button>
                          <button onClick={e=>{e.stopPropagation();handleDel(r.id);}}
                            style={{padding:"4px 10px",borderRadius:6,background:"#FFF0F0",color:C.danger,border:"1px solid #ECC8C8",cursor:"pointer",fontSize:12,fontFamily:font}}>✕</button>
                        </div>
                      </td>
                    </tr>
                  )
              ))}
            </tbody>
          </table>
        </div>

        {/* ── 檢視紀錄 Panel ── */}
        {viewRec&&(
          <div style={{margin:"0 0 0 0",borderTop:`2px solid ${C.primary}`,background:"#F8FCFA"}}>
            <div style={{padding:"16px 28px",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:12}}>
              <div style={{flex:1}}>
                <div style={{fontSize:11,color:C.muted,fontWeight:600,letterSpacing:"0.06em",marginBottom:8}}>聯繫內容詳情</div>
                <div style={{display:"flex",gap:16,fontSize:12,color:C.muted,marginBottom:12,flexWrap:"wrap"}}>
                  <span>📅 {fmtDate(viewRec.date)}</span>
                  <span>👤 {viewRec.contactPerson||"—"}</span>
                  <span>🏢 {viewRec.resourceUnit||"—"}</span>
                  <span><MethodBadge m={viewRec.contactMethod||"電訪"}/></span>
                  <span>×{viewRec.contactCount||1} 次</span>
                </div>
                <div style={{fontSize:14,color:C.text,lineHeight:1.85,whiteSpace:"pre-wrap",wordBreak:"break-word",background:C.card,borderRadius:10,padding:"14px 18px",border:`1px solid ${C.border}`,minHeight:80}}>
                  {viewRec.content||<span style={{color:C.border}}>（無聯繫內容）</span>}
                </div>
              </div>
              <button onClick={()=>setViewRec(null)}
                style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:C.muted,flexShrink:0,marginTop:20}}>✕</button>
            </div>
          </div>
        )}

        {/* ── 分頁 ── */}
        <div style={{padding:"14px 24px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,background:C.cardAlt}}>
          <div style={{fontSize:12,color:C.muted}}>
            {records.length===0?"尚無資料":`顯示第 ${(page-1)*PAGE+1}–${Math.min(page*PAGE,records.length)} 筆，共 ${records.length} 筆`}
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            {[{l:"«",fn:()=>setPage(1),dis:page===1},{l:"‹",fn:()=>setPage(p=>p-1),dis:page===1},
              {l:"›",fn:()=>setPage(p=>p+1),dis:page===totalPages},{l:"»",fn:()=>setPage(totalPages),dis:page===totalPages}]
              .map(({l,fn,dis})=>(
                <button key={l} onClick={fn} disabled={dis}
                  style={{padding:"4px 9px",borderRadius:6,border:`1px solid ${C.border}`,background:C.card,
                    cursor:dis?"default":"pointer",color:dis?C.border:C.text,fontSize:13,fontFamily:font}}>
                  {l}
                </button>
              ))}
            <span style={{fontSize:12,color:C.muted,padding:"0 6px"}}>第 {page} / {totalPages} 頁</span>
          </div>
        </div>

      </div>
    </div>
  );
}

// ── MONTHLY REPORT ───────────────────────────────────────────────
function MonthlyReport({data,setData,onSave}){
  const now=new Date();
  const [year,setYear]=useState(now.getFullYear());
  const [month,setMonth]=useState(now.getMonth()+1);

  const pad=n=>String(n).padStart(2,"0");
  const monthStr=`${year}-${pad(month)}`;
  const rocYear=year-1911;
  const [editId,setEditId]=useState(null);
  const [filterMethod,setFilterMethod]=useState(null);

  const exportExcel=()=>{
    const rows=[["日期","個案姓名","案號","聯繫對象","資源聯繫單位","聯繫方式","次數","聯繫內容"]];
    const recs=(data.caseRecords||[]).filter(r=>r.date?.startsWith(monthStr)).sort((a,b)=>a.date.localeCompare(b.date));
    recs.forEach(r=>{
      const c=data.cases.find(x=>x.id===r.caseId);
      rows.push([
        r.date||"",
        c?.name||"（未知）",
        c?.caseNo||"",
        r.contactPersonType?`${r.contactPersonType}${r.contactPerson?` ${r.contactPerson}`:""}`:r.contactPerson||"",
        r.resourceUnit||"",
        r.contactMethod||"",
        parseInt(r.contactCount||1),
        r.content||""
      ]);
    });
    // 加統計列
    rows.push([]);
    rows.push(["統計","聯繫筆數",recs.length,"服務人次",recs.reduce((s,r)=>s+parseInt(r.contactCount||1),0)]);
    const ws=XLSX.utils.aoa_to_sheet(rows);
    // 欄寬
    ws["!cols"]=[{wch:12},{wch:10},{wch:14},{wch:16},{wch:18},{wch:10},{wch:6},{wch:40}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,`${rocYear}年${MONTH_NAMES[month-1]}`);
    XLSX.writeFile(wb,`月服務報表_民${rocYear}年${MONTH_NAMES[month-1]}.xlsx`);
  };
  const [editRec,setEditRec]=useState({});
  const fldEdit=(k,v)=>setEditRec(r=>({...r,[k]:v}));

  const handleSave=async()=>{
    const updated={...editRec,lastModified:toDay()};
    setData(d=>({...d,caseRecords:(d.caseRecords||[]).map(r=>r.id===editId?updated:r)}));
    await onSave("caseRecords",updated);
    setEditId(null);
  };

  // 篩選該月份的聯繫紀錄
  const records=(data.caseRecords||[])
    .filter(r=>r.date?.startsWith(monthStr))
    .sort((a,b)=>a.date.localeCompare(b.date));

  // 個案名稱對照
  const caseName=id=>data.cases.find(c=>c.id===id)?.name||"（未知）";
  const caseNo=id=>data.cases.find(c=>c.id===id)?.caseNo||"";

  // 統計
  const totalCount=records.reduce((s,r)=>s+parseInt(r.contactCount||1),0);
  const byMethod={};
  records.forEach(r=>{
    const m=r.contactMethod||"其他";
    byMethod[m]=(byMethod[m]||0)+parseInt(r.contactCount||1);
  });
  const byCaseCount={};
  records.forEach(r=>{byCaseCount[r.caseId]=(byCaseCount[r.caseId]||0)+parseInt(r.contactCount||1);});
  const caseCount=Object.keys(byCaseCount).length;

  const prevMonth=()=>{if(month===1){setYear(y=>y-1);setMonth(12);}else setMonth(m=>m-1);};
  const nextMonth=()=>{if(month===12){setYear(y=>y+1);setMonth(1);}else setMonth(m=>m+1);};

  const MONTH_NAMES=["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];

  return(
    <div>
      {/* 標題與月份切換 */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
        <h1 style={{fontSize:22,fontWeight:700,fontFamily:serif,color:C.text,margin:0}}>月服務報表</h1>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <button onClick={prevMonth} style={{width:32,height:32,borderRadius:8,border:`1px solid ${C.border}`,background:C.card,cursor:"pointer",fontSize:16}}>‹</button>
          <span style={{fontSize:15,fontWeight:700,color:C.text,minWidth:120,textAlign:"center",fontFamily:serif}}>
            民{rocYear}年 {MONTH_NAMES[month-1]}
          </span>
          <button onClick={nextMonth} style={{width:32,height:32,borderRadius:8,border:`1px solid ${C.border}`,background:C.card,cursor:"pointer",fontSize:16}}>›</button>
          <button onClick={exportExcel}
            style={{padding:"7px 16px",borderRadius:8,border:"none",background:"#2A7A4A",color:"#fff",cursor:"pointer",fontSize:12,fontFamily:font,fontWeight:600,display:"flex",alignItems:"center",gap:6,marginLeft:8}}>
            📥 匯出 Excel
          </button>
        </div>
      </div>

      {/* 統計摘要 */}
      <div style={{display:"flex",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        {[
          {label:"聯繫紀錄筆數",val:records.length,color:C.primary},
          {label:"服務人次",val:totalCount,color:C.accent},
          {label:"服務個案數",val:caseCount,color:"#4A6E8A"},
        ].map(({label,val,color})=>(
          <div key={label} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 20px",flex:1,minWidth:100}}>
            <div style={{fontSize:28,fontWeight:700,color,fontFamily:serif}}>{val}</div>
            <div style={{fontSize:12,color:C.muted,marginTop:4}}>{label}</div>
          </div>
        ))}
      </div>

      {/* 聯繫方式統計 */}
      {Object.keys(byMethod).length>0&&(
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 20px",marginBottom:20}}>
          <div style={{fontSize:12,fontWeight:700,color:C.muted,letterSpacing:"0.06em",marginBottom:10}}>聯繫方式分布</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {Object.entries(byMethod).sort((a,b)=>b[1]-a[1]).map(([m,n])=>(
              <div key={m} onClick={()=>setFilterMethod(f=>f===m?null:m)}
                style={{padding:"6px 14px",borderRadius:20,cursor:"pointer",fontSize:12,fontWeight:600,
                  background:filterMethod===m?C.primary:"#EEF7F3",
                  border:`1px solid ${C.primary}`,
                  color:filterMethod===m?"#fff":C.primary,
                  transition:"all 0.15s"}}>
                {m} <span style={{fontWeight:700}}>{n}</span> 次
                {filterMethod===m&&<span style={{marginLeft:5,opacity:0.7}}>✕</span>}
              </div>
            ))}
          </div>
          {filterMethod&&<div style={{fontSize:11,color:C.muted,marginTop:8}}>
            {"顯示「"+filterMethod+"」的 "+records.filter(r=>r.contactMethod===filterMethod).length+" 筆紀錄"} <button onClick={()=>setFilterMethod(null)} style={{background:"none",border:"none",cursor:"pointer",color:C.primary,fontSize:11,padding:0,marginLeft:4}}>清除篩選</button>
          </div>}
        </div>
      )}

      {/* 條列式紀錄 */}
      {records.length===0
        ? <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"40px",textAlign:"center",color:C.muted,fontSize:14}}>
            {MONTH_NAMES[month-1]}無聯繫紀錄
          </div>
        : <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden"}}>
            <div style={{padding:"12px 20px",background:C.cardAlt,borderBottom:`1px solid ${C.border}`,display:"grid",gridTemplateColumns:"90px 80px 90px 70px 1fr auto",gap:8,fontSize:11,fontWeight:700,color:C.muted,letterSpacing:"0.04em"}}>
              <span>日期</span><span>個案</span><span>聯繫對象</span><span>方式／次數</span><span>內容</span><span></span>
            </div>
            {(filterMethod?records.filter(r=>r.contactMethod===filterMethod):records).map((r,i)=>(
              editId===r.id
              ? <div key={r.id} style={{padding:"14px 20px",borderBottom:`1px solid ${C.border}`,background:"#F8F5F0",display:"flex",flexDirection:"column",gap:10}}>
                  <div style={{fontSize:12,fontWeight:600,color:C.accent,marginBottom:2}}>編輯紀錄 — {caseName(r.caseId)}</div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px 14px"}}>
                    <div>
                      <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:3}}>日期</label>
                      <input type="date" value={editRec.date||""} onChange={e=>fldEdit("date",e.target.value)} style={{...inp(),fontSize:13}}/>
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <div style={{flex:2}}>
                        <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:3}}>聯繫方式</label>
                        <select value={editRec.contactMethod||"電訪"} onChange={e=>fldEdit("contactMethod",e.target.value)} style={{...inp(),fontSize:13}}>
                          {["電訪","家訪","晤談","外訪","代辦","陪同","簡訊","個研","函件","其他"].map(m=><option key={m}>{m}</option>)}
                        </select>
                      </div>
                      <div style={{flex:1}}>
                        <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:3}}>次數</label>
                        <input type="number" min="1" value={editRec.contactCount||"1"} onChange={e=>fldEdit("contactCount",e.target.value)} style={{...inp(),fontSize:13}}/>
                      </div>
                    </div>
                    <div style={{gridColumn:"span 2"}}>
                      <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:3}}>聯繫內容</label>
                      <textarea value={editRec.content||""} onChange={e=>fldEdit("content",e.target.value)} rows={3} style={{...inp(),fontSize:13,resize:"vertical",lineHeight:1.6}}/>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                    <button onClick={()=>setEditId(null)} style={{padding:"6px 16px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,cursor:"pointer",fontSize:13,fontFamily:font}}>取消</button>
                    <button onClick={handleSave} style={{padding:"6px 18px",borderRadius:8,border:"none",background:C.primary,color:"#fff",cursor:"pointer",fontSize:13,fontFamily:font,fontWeight:600}}>儲存</button>
                  </div>
                </div>
              : <div key={r.id} style={{padding:"12px 20px",borderBottom:`1px solid ${C.border}`,display:"grid",gridTemplateColumns:"90px 80px 90px 70px 1fr auto",gap:8,alignItems:"start",background:i%2===0?C.card:C.cardAlt,fontSize:13}}>
                  <span style={{color:C.primary,fontWeight:600,whiteSpace:"nowrap"}}>{fmtDate(r.date)}</span>
                  <span style={{fontWeight:700,color:C.text}}>{caseName(r.caseId)}</span>
                  <span style={{color:C.muted,fontSize:12}}>{r.contactPersonType?`${r.contactPersonType}${r.contactPerson?`・${r.contactPerson}`:""}`:r.contactPerson||"—"}</span>
                  <span style={{fontSize:11}}>
                    <span style={{padding:"2px 7px",borderRadius:20,background:"#EEF7F3",color:C.primary,fontWeight:600}}>{r.contactMethod||"—"}</span>
                    <span style={{color:C.muted,marginLeft:4}}>×{r.contactCount||1}</span>
                  </span>
                  <span style={{color:C.text,lineHeight:1.6,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{r.content||<span style={{color:C.border}}>—</span>}</span>
                  <button onClick={()=>{setEditId(r.id);setEditRec({...r});}}
                    style={{padding:"4px 10px",borderRadius:6,border:`1px solid ${C.border}`,background:C.card,cursor:"pointer",fontSize:12,color:C.muted,fontFamily:font,whiteSpace:"nowrap"}}>
                    ✏️
                  </button>
                </div>
            ))}
            {(()=>{
              const shown=filterMethod?records.filter(r=>r.contactMethod===filterMethod):records;
              const shownCount=shown.reduce((s,r)=>s+parseInt(r.contactCount||1),0);
              const shownCases=new Set(shown.map(r=>r.caseId)).size;
              return(
                <div style={{padding:"12px 20px",background:C.cardAlt,borderTop:`2px solid ${C.border}`,fontSize:12,color:C.muted,display:"flex",gap:20,flexWrap:"wrap"}}>
                  <span>合計 <strong style={{color:C.text}}>{shown.length}</strong> 筆紀錄{filterMethod?" (篩選中)":""}</span>
                  <span>服務人次 <strong style={{color:C.accent}}>{shownCount}</strong> 次</span>
                  <span>涉及個案 <strong style={{color:"#4A6E8A"}}>{shownCases}</strong> 人</span>
                </div>
              );
            })()}
          </div>
      }
    </div>
  );
}

// ── USER SETTINGS ────────────────────────────────────────────────
function UserSettings({userName,onSave,onClose}){
  const [name,setName]=useState(userName||"");
  const [clientId,setClientId]=useState(()=>localStorage.getItem("gcal_ical_url")||"");
  const [saving,setSaving]=useState(false);
  const [done,setDone]=useState(false);

  const handleSave=async()=>{
    if(!name.trim()){alert("請填寫名稱");return;}
    setSaving(true);
    localStorage.setItem("gcal_ical_url",clientId.trim());
    await onSave(name.trim());
    setDone(true);setSaving(false);
    setTimeout(onClose,800);
  };

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(26,51,50,0.6)",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:C.card,borderRadius:16,width:"min(440px,92vw)",boxShadow:"0 24px 64px rgba(0,0,0,0.28)",overflow:"hidden"}}>
        <div style={{background:C.sidebar,padding:"20px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:15,fontWeight:700,color:"#fff",fontFamily:serif}}>用戶設定</span>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.12)",border:"none",color:"#fff",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16}}>✕</button>
        </div>
        <div style={{padding:"24px"}}>
          <label style={{fontSize:12,color:C.muted,display:"block",marginBottom:6,fontWeight:500}}>社工顯示名稱</label>
          <input value={name} onChange={e=>setName(e.target.value)}
            placeholder="輸入你的名稱"
            style={{...inp(),fontSize:15,marginBottom:8}}
            onKeyDown={e=>e.key==="Enter"&&handleSave()}/>
          <div style={{fontSize:11,color:C.muted,marginBottom:20}}>此名稱會顯示在登入畫面、側邊欄及聯繫紀錄中</div>
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:16,marginBottom:16}}>
            <label style={{fontSize:12,color:C.muted,display:"block",marginBottom:6,fontWeight:500}}>📅 Google 日曆 iCal 網址</label>
            <input value={clientId} onChange={e=>setClientId(e.target.value)}
              placeholder="貼上 Google 日曆 iCal 公開網址..."
              style={{...inp(),fontSize:12,marginBottom:6}}/>
            <div style={{fontSize:11,color:C.muted,lineHeight:1.6}}>
              Google 日曆 → 設定 → 選擇日曆 → 整合日曆 → 複製「公開網址（iCal 格式）」
            </div>
          </div>
          {done
            ? <div style={{textAlign:"center",color:"#2A9D5C",fontWeight:600,fontSize:14}}>✓ 已儲存！</div>
            : <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                <button onClick={onClose} style={{padding:"8px 18px",borderRadius:8,border:`1px solid ${C.border}`,background:C.card,cursor:"pointer",fontSize:13,fontFamily:font}}>取消</button>
                <button onClick={handleSave} disabled={saving} style={{padding:"8px 22px",borderRadius:8,border:"none",background:C.primary,color:"#fff",cursor:"pointer",fontSize:13,fontFamily:font,fontWeight:600,opacity:saving?0.7:1}}>
                  {saving?"儲存中...":"儲存"}
                </button>
              </div>
          }
        </div>
      </div>
    </div>
  );
}

        {onLogout&&<button onClick={onLogout} style={{width:"100%",padding:"8px 16px",background:"transparent",border:"none",color:"rgba(255,255,255,0.35)",fontSize:12,cursor:"pointer",fontFamily:font,textAlign:"left"}}>⎋ 登出</button>}
        <div style={{padding:"10px 16px",fontSize:10,color:"rgba(255,255,255,0.2)",textAlign:"center"}}>{new Date().toLocaleDateString("zh-TW",{month:"long",day:"numeric"})}</div>
      </div>
    </div>
  );
}

// ── APP ─────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState("dashboard");
  const [data,setData]=useState({cases:[],visits:[],resources:DEFAULT_RESOURCES,diary:[],events:[],caseRecords:[],levelHistory:[]});
  const [syncStatus,setSyncStatus]=useState("local");
  const [showSetup,setShowSetup]=useState(false);
  const [ready,setReady]=useState(false);
  const [authReady,setAuthReady]=useState(false);
  const [user,setUser]=useState(null);
  const [userName,setUserName]=useState("");
  const [showUserSettings,setShowUserSettings]=useState(false);

  // 初始化時先等 Firebase Auth 狀態確認
  useEffect(()=>{
    (async()=>{
      if(isFirebaseConfigured()){
        const ok=await initFirebase();
        if(ok){
          // 監聽登入狀態
          firebase.auth().onAuthStateChanged(u=>{
            setUser(u);
            setAuthReady(true);
          });
        }else{
          setAuthReady(true);
        }
      }else{
        setAuthReady(true);
      }
    })();
  },[]);

  // 登入後才載入資料
  useEffect(()=>{
    if(!authReady)return;
    (async()=>{
      if(user&&isFirebaseConfigured()&&firebaseReady){
        setSyncStatus("syncing");
        try{
          // 載入用戶名稱
          try{
            const profileDoc=await db.collection("users").doc(user.uid).get();
            if(profileDoc.exists&&profileDoc.data().displayName){
              setUserName(profileDoc.data().displayName);
            }else{
              setUserName(user.email?.split("@")[0]||"社工");
            }
          }catch{}
          // 嘗試搬移舊資料（只在第一次登入時執行）
          const migrated=await migrateOldData();
          if(migrated)console.log("✅ 舊資料搬移完成");
          const [cases,visits,resources,diary,events,caseRecords,levelHistory]=await Promise.all([fbGet("cases"),fbGet("visits"),fbGet("resources"),fbGet("diary"),fbGet("events"),fbGet("caseRecords"),fbGet("levelHistory")]);
          
          const r=resources.length>0?resources:DEFAULT_RESOURCES;
          setData({cases,visits,resources:r,diary,events,caseRecords,levelHistory:levelHistory||[]});
          setSyncStatus("synced");
        }catch(e){
          console.error(e);
          const local=loadLocal();
          if(local)setData(local);
          setSyncStatus("error");
        }
      }else if(!user){
        // 未登入，清空資料
        setData({cases:[],visits:[],resources:DEFAULT_RESOURCES,diary:[],caseRecords:[],levelHistory:[]});
      }else{
        const local=loadLocal();
        if(local)setData(local);
        setSyncStatus("local");
      }
      setReady(true);
    })();
  },[authReady,user]);

  // 本機備份
  useEffect(()=>{if(ready&&user)saveLocal(data);},[data,ready,user]);

  const saveUserName=async(name)=>{
    setUserName(name);
    if(db&&user){
      await db.collection("users").doc(user.uid).set({displayName:name},{merge:true});
    }
  };

  const onSave=async(col,item)=>{
    if(!firebaseReady)return;
    setSyncStatus("syncing");
    try{await fbSave(col,item);setSyncStatus("synced");}
    catch(e){console.error(e);setSyncStatus("error");}
  };
  const onDelete=async(col,id)=>{
    if(!firebaseReady)return;
    setSyncStatus("syncing");
    try{await fbDelete(col,id);setSyncStatus("synced");}
    catch(e){console.error(e);setSyncStatus("error");}
  };

  const handleLogout=async()=>{
    if(!confirm("確定要登出嗎？"))return;
    await firebase.auth().signOut();
    setReady(false);
  };

  // 等待 auth 狀態確認
  if(!authReady)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,fontFamily:font,color:C.muted,flexDirection:"column",gap:12}}><div style={{fontSize:16}}>載入中...</div></div>);

  // 未登入 → 顯示登入畫面
  if(!user&&isFirebaseConfigured())return<LoginScreen onLogin={()=>{}}/>;

  // 資料載入中
  if(!ready)return(<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,fontFamily:font,color:C.muted,flexDirection:"column",gap:12}}><div style={{fontSize:16}}>資料載入中...</div><div style={{fontSize:12,color:C.border}}>正在連接雲端...</div></div>);

  return(
    <div className="layout" style={{display:"flex",height:"100vh",overflow:"hidden",fontFamily:font,background:C.bg}}>
      {showSetup&&<SetupGuide/>}
      <Sidebar view={view} setView={setView} syncStatus={syncStatus} onSetup={()=>setShowSetup(v=>!v)} onLogout={user?handleLogout:null} userName={userName} onUserSettings={()=>setShowUserSettings(true)}/>
      {showUserSettings&&<UserSettings userName={userName} onSave={saveUserName} onClose={()=>setShowUserSettings(false)}/>}
      <div className="main-content" style={{flex:1,overflow:"auto",padding:"32px 36px",WebkitOverflowScrolling:"touch",minHeight:0}}>
        {view==="dashboard"&&<Dashboard data={data} setView={setView} setData={setData} onSave={onSave}/>}
        {view==="calendar"  &&<CalendarView data={data} setData={setData} onSave={onSave} onDelete={onDelete}/>}
        {view==="cases"    &&<CaseList  data={data} setData={setData} onSave={onSave} onDelete={onDelete}/>}
        {view==="resources"&&<ResourceList data={data} setData={setData} onSave={onSave} onDelete={onDelete}/>}
        {view==="diary"    &&<DiaryLog  data={data} setData={setData} onSave={onSave} onDelete={onDelete}/>}
        {view==="monthly"  &&<MonthlyReport data={data} setData={setData} onSave={onSave}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
